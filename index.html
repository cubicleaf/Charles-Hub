  <script>
    /* =====================================================================
       STATE
       ===================================================================== */
    let SUBJECTS = [];                  // loaded from /subjects.json
    let activeSubject = null;           // current subject object
    let activeFile = null;              // currently displayed filename (non-dispatch)
    let activeDate = null;              // currently selected date string (dispatch)
    let activeIndex = [];               // current subject's parsed index.json
    const subjectIndexCache = {};       // { briefs: [...], lexis: [...] } — avoid re-fetch

    /* =====================================================================
       UTILITIES
       ===================================================================== */
    const cb = () => `?t=${Date.now()}`; // cache-buster query string

    function formatDateLong(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      return new Intl.DateTimeFormat('en-US', {
        month: 'long', day: 'numeric', year: 'numeric', timeZone: 'UTC'
      }).format(dt);
    }
    function todayInEastern() {
      const now = new Date();
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/New_York',
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(now);
      const get = t => parts.find(p => p.type === t).value;
      return `${get('year')}-${get('month')}-${get('day')}`;
    }
    function dayOfWeek(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d, 12));
      return new Intl.DateTimeFormat('en-US', { weekday: 'long', timeZone: 'UTC' }).format(dt);
    }
    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function parseDomain(url) {
      try { return new URL(url).hostname.replace(/^www\./, ''); } catch { return ''; }
    }

    /* =====================================================================
       FRONTMATTER PARSING
       ===================================================================== */
    function parseFrontmatter(text) {
      const fm = /^---\n([\s\S]*?)\n---\n?([\s\S]*)$/.exec(text);
      if (!fm) return { frontmatter: {}, body: text };
      try {
        const frontmatter = jsyaml.load(fm[1]) || {};
        if (frontmatter.date instanceof Date) {
          const d = frontmatter.date;
          frontmatter.date = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
        }
        if (Array.isArray(frontmatter.sources)) {
          frontmatter.sources.forEach(src => {
            if (src && src.date instanceof Date) {
              const d = src.date;
              src.date = `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
            }
          });
        }
        return { frontmatter, body: fm[2] };
      } catch (err) {
        console.warn('Frontmatter parse error:', err);
        return { frontmatter: {}, body: fm[2] };
      }
    }

    /* =====================================================================
       SUBJECT MANAGEMENT
       ===================================================================== */
    async function loadSubjects() {
      try {
        const res = await fetch(`/subjects.json${cb()}`);
        if (!res.ok) throw new Error(`subjects fetch failed: ${res.status}`);
        SUBJECTS = await res.json();
        // LOCAL-ONLY overlay: subjects.local.json is gitignored, so it is
        // absent on the public Vercel deploy (this fetch 404s and is ignored)
        // and present only when running the viewer locally. Used for private
        // subjects (e.g. Progress Clarity) that must never be published.
        try {
          const localRes = await fetch(`/subjects.local.json${cb()}`);
          if (localRes.ok) {
            const localSubjects = await localRes.json();
            if (Array.isArray(localSubjects)) SUBJECTS = SUBJECTS.concat(localSubjects);
          }
        } catch (_) { /* no local overlay — expected on public deploy */ }
      } catch (err) {
        console.error('Failed to load subjects.json', err);
        document.getElementById('content').innerHTML =
          `<div class="error-message">Could not load subjects manifest. (See console for details.)</div>`;
        return false;
      }
      return true;
    }

    function renderPillbar() {
      const bar = document.getElementById('pillbar');
      bar.innerHTML = '';
      SUBJECTS.forEach(s => {
        const btn = document.createElement('button');
        btn.className = 'pill';
        btn.textContent = s.name;
        btn.dataset.id = s.id;
        btn.addEventListener('click', () => switchSubject(s.id));
        bar.appendChild(btn);
      });
    }

    function updatePillSelection() {
      document.querySelectorAll('.pill').forEach(p => {
        p.classList.toggle('selected', p.dataset.id === activeSubject.id);
      });
    }

    // Accent is now a single unified bronze across every tab — the per-tab
    // colors (red/green/blue) from subjects.json are intentionally ignored so
    // nothing in the UI or article bodies tints by tab anymore.
    function setAccent(_color) {
      document.documentElement.style.setProperty('--accent', '#7d6238');
    }

    async function switchSubject(subjectId) {
      const next = SUBJECTS.find(s => s.id === subjectId);
      if (!next) return;
      activeSubject = next;
      try { localStorage.setItem('active-subject', next.id); } catch(e) {}
      setAccent(next.accent);
      document.body.classList.remove(
        'style-literary', 'style-dispatch'
      );
      document.body.classList.add('style-' + (next.style || 'neutral'));
      updatePillSelection();

      // Restore buttons that specialized views may hide; hide progress-specific ones
      document.getElementById('shelf-btn').setAttribute('aria-label', 'Archive');
      // Universal collapse button visibility/icon is governed per-render by
      // syncCollapseIcon(); no per-tab show/hide needed here.
      stopLitScrollTracker();

      // A: Clear stale sources + read indicator immediately (before any async)
      renderSources(null);
      updateReadIndicator(null);

      document.getElementById('content').innerHTML = '<div class="loading">Loading&hellip;</div>';
      await loadSubjectIndex(next);

      // Dispatch: load latest date; non-dispatch: reset dispatch DOM
      if (next.style === 'dispatch') {
        const latestDate = activeIndex.length > 0 ? (activeIndex[0].run_date || activeIndex[0].date) : null;
        if (latestDate) { loadDate(latestDate); return; }
      } else {
        document.getElementById('context-btn').classList.remove('has-context');
        document.getElementById('dispatch-dateline').style.display = 'none';
      }

      if (activeIndex.length > 0) {
        loadFile(activeIndex[0].file);
      } else {
        document.getElementById('masthead-title').textContent = next.displayTitle || next.name;
        document.getElementById('masthead-date').textContent = '';
        document.getElementById('content').innerHTML =
          `<div class="error-message">No files yet in this subject. Add a markdown file to <code>/${next.folder}/</code> and an entry to <code>/${next.folder}/index.json</code>.</div>`;
        document.getElementById('sources-btn').style.display = 'none';
        document.getElementById('stale-banner').style.display = 'none';
      }
    }

    // D: Sort parchment + lvls reverse-chrono; undated entries sink to bottom.
    // Shared by loadSubjectIndex() AND buildSearchIndex() — both populate
    // subjectIndexCache, and whichever runs first "wins" the cached array for
    // every later reader. If only one of them sorted, a subject whose
    // index.json got cached by the other path first would render unsorted
    // (this is what was happening to FI: buildSearchIndex's background prefetch
    // cached it raw before the tab was ever opened, so loadSubjectIndex's
    // cache-hit branch returned the unsorted array and skipped sorting).
    function sortSubjectIndex(subject, idx) {
      return idx;
    }

    async function loadSubjectIndex(subject) {
      if (subjectIndexCache[subject.id]) {
        activeIndex = subjectIndexCache[subject.id];
        return;
      }
      try {
        const res = await fetch(`/${subject.folder}/index.json${cb()}`);
        if (!res.ok) throw new Error(`index fetch failed: ${res.status}`);
        activeIndex = await res.json();
        sortSubjectIndex(subject, activeIndex);
        subjectIndexCache[subject.id] = activeIndex;
      } catch (err) {
        console.error('Subject index fetch failed:', err);
        activeIndex = [];
      }
    }

    /* =====================================================================
       FILE LOADING
       ===================================================================== */
    async function loadFile(filename) {
      activeFile = filename;
      updateReadIndicator(null); // clear while loading
      const url = `/${activeSubject.folder}/${filename}${cb()}`;
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`file fetch failed: ${res.status}`);
        const raw = await res.text();
        const { frontmatter, body } = parseFrontmatter(raw);
        renderMasthead(frontmatter);
        renderContent(body);
        renderSources(frontmatter.sources || null);
        checkStale(frontmatter, isLatestFile(filename));
        appendReadCheckbox(filename); // F: add read checkbox
      } catch (err) {
        console.error('File fetch failed:', err);
        document.getElementById('content').innerHTML =
          `<div class="error-message">Could not load <code>${escapeHtml(filename)}</code>.<br><small style="opacity:0.6;font-size:0.75rem">${escapeHtml(err.message || String(err))}</small></div>`;
      }
    }

    function isLatestFile(filename) {
      return activeIndex.length > 0 && activeIndex[0].file === filename;
    }

    /* =====================================================================
       DISPATCH DATE LOADING — fetches all stories for a date, renders digest
       ===================================================================== */
    async function loadDate(runDate) {
      activeDate = runDate;
      activeFile = null;
      // A: Clear stale sources + read indicator while loading
      renderSources(null);
      updateReadIndicator(null);
      // Filter by run_date (falls back to date for legacy entries without run_date)
      const stories = activeIndex.filter(item => (item.run_date || item.date) === runDate);
      if (!stories.length) return;

      // Masthead: subject name + formatted run date
      // Remove landing-mode in case we're arriving from a card-style tab (LvIs/FI/etc.) —
      // that class hides masthead-title via CSS, and loadDate() doesn't go through
      // renderMasthead() which is the normal place this gets cleared.
      document.querySelector('header').classList.remove('landing-mode');
      const titleEl = document.getElementById('masthead-title');
      const dateEl  = document.getElementById('masthead-date');
      titleEl.textContent = activeSubject.displayTitle || activeSubject.name;
      dateEl.textContent = formatDateDispatch(runDate);
      document.getElementById('dispatch-dateline').style.display = 'none';
      document.getElementById('stale-banner').style.display = 'none';

      document.getElementById('content').innerHTML = '<div class="loading">Loading&hellip;</div>';

      // Fetch all story files in parallel
      const fetched = await Promise.all(stories.map(async (item, idx) => {
        try {
          const res = await fetch(`/${activeSubject.folder}/${item.file}${cb()}`);
          if (!res.ok) throw new Error(`${res.status}`);
          const raw = await res.text();
          return { ...parseFrontmatter(raw), indexItem: item };
        } catch (err) {
          return { frontmatter: { title: item.title, date: item.date, significance: item.significance || 0 }, body: `*Could not load ${item.file}.*`, indexItem: item };
        }
      }));

      // Sort by significance desc (highest first)
      fetched.sort((a, b) => (b.frontmatter.significance || 0) - (a.frontmatter.significance || 0));

      // Build combined HTML
      const content = document.getElementById('content');
      content.innerHTML = '';

      try {
        // At a glance — Roman-numeral summaries linking to each story below
        const glanceH2 = document.createElement('h2');
        glanceH2.className = 'glance-heading';
        glanceH2.textContent = 'At a glance';
        const glanceOl = document.createElement('ol');
        fetched.forEach(({ frontmatter: fm, indexItem: ii }, idx) => {
          const text = (ii && ii.summary) ? ii.summary : (fm.title || `Story ${idx + 1}`);
          const li = document.createElement('li');
          li.className = 'glance-link';
          li.textContent = text;
          li.addEventListener('click', () => scrollToStory(idx + 1));
          glanceOl.appendChild(li);
        });
        content.appendChild(glanceH2);
        content.appendChild(glanceOl);

        fetched.forEach(({ frontmatter: fm, body, indexItem }, idx) => {
          const block = document.createElement('div');
          block.className = 'dispatch-day-story';
          block.id = `dispatch-story-${idx + 1}`;

          // Dateline: all sources as stacked clickable links, each with their own date
          const allSources = Array.isArray(fm.sources) ? fm.sources : [];
          const sourceItems = allSources.map(src => {
            const label = (src.outlet || src.publication || parseDomain(src.url || '') || '').toUpperCase();
            const date  = src.date ? ` · ${formatDateDispatch(src.date)}` : '';
            const text  = escapeHtml(label + date);
            return src.url
              ? `<a href="${escapeHtml(src.url)}" target="_blank" rel="noopener noreferrer" class="dispatch-dateline">${text}</a>`
              : `<span class="dispatch-dateline">${text}</span>`;
          });
          if (!sourceItems.length && fm.date) {
            sourceItems.push(`<span class="dispatch-dateline">${escapeHtml(formatDateDispatch(fm.date))}</span>`);
          }

          const hasStoryContext = Array.isArray(fm.context) && fm.context.length > 0;
          let html = '';
          if (sourceItems.length) {
            const ctxBtn = hasStoryContext
              ? `<button class="story-context-btn" aria-haspopup="dialog">Context</button>`
              : '';
            html += `<div class="dispatch-dateline-block">
              <div class="dispatch-dateline-row">
                <div class="dispatch-source-list">${sourceItems.join('')}</div>
                ${ctxBtn}
              </div>
              <span class="dispatch-rule" aria-hidden="true"></span>
            </div>`;
          }

          // Story headline
          if (fm.title) {
            html += `<h2 class="dispatch-day-headline">${escapeHtml(fm.title)}</h2>`;
          }
          // C: One-sentence summary tagline from index metadata
          if (indexItem && indexItem.summary) {
            html += `<p class="dispatch-day-summary">${escapeHtml(indexItem.summary)}</p>`;
          }

          // Story body
          html += `<div class="dispatch-body-wrap">${marked.parse(body || '')}</div>`;

          block.innerHTML = html;
          if (hasStoryContext) {
            const btn = block.querySelector('.story-context-btn');
            if (btn) btn.addEventListener('click', () => openContextForStory(fm, fm.title || `Story ${idx + 1}`, btn));
          }
          content.appendChild(block);
        });
      } catch (err) {
        console.error('Dispatch render error:', err);
        content.innerHTML += `<div class="error-message" style="margin-top:1rem;">Render error: ${escapeHtml(String(err))}<br><small style="opacity:0.6;font-size:0.75rem">${escapeHtml(err.stack || '')}</small></div>`;
      }

      makeDispatchStoriesCollapsible(content);   // Israel: each story collapses like Tech
      syncCollapseIcon();

      // Sources modal: tech-brief format — numbered groups by story headline
      const sourceGroups = fetched.map(({ frontmatter: fm }, i) => ({
        group: `${i + 1} · ${(fm.title || 'Story').toUpperCase()}`,
        why: fm.significance_reason || '',
        links: (fm.sources || []).map(s => ({
          title: s.outlet || s.publication || parseDomain(s.url || '') || s.url,
          url: s.url || '#'
        }))
      })).filter(g => g.links.length > 0);
      renderSources(sourceGroups.length ? sourceGroups : null);

      // Context modal: group by story, dedup across stories (first story wins for shared entries)
      const seenNames = new Set();
      const storyContextGroups = fetched.map(({ frontmatter: fm }, idx) => {
        const storyContext = [];
        (fm.context || []).forEach(entry => {
          if (!seenNames.has(entry.name)) {
            seenNames.add(entry.name);
            storyContext.push(entry);
          }
        });
        return { storyNum: idx + 1, title: fm.title || `Story ${idx + 1}`, context: storyContext };
      }).filter(g => g.context.length > 0);
      renderContext(storyContextGroups);
      appendReadCheckbox(runDate); // F: add read checkbox
      syncCollapseIcon();          // Israel/dispatch has no .lvl-section → hides the button
    }

    function renderMasthead(fm) {
      // Restore title visibility if we're coming from a landing-card view
      document.querySelector('header').classList.remove('landing-mode');

      const titleEl = document.getElementById('masthead-title');
      const dateEl = document.getElementById('masthead-date');

      titleEl.textContent = activeSubject.displayTitle || activeSubject.name;

      // Dispatch uses loadDate() — renderMasthead not called for dispatch
      if (activeSubject.style === 'dispatch') return;

      if (activeSubject.style === 'literary' && fm.date) {
        const day = (fm.day || dayOfWeek(fm.date)).toUpperCase();
        const formatted = formatDateLong(fm.date).toUpperCase();
        dateEl.textContent = `${day} · ${formatted}`;
      } else if (fm.date) {
        dateEl.textContent = formatDateLong(fm.date);
      } else {
        const entry = activeIndex.find(e => e.file === activeFile);
        dateEl.textContent = entry ? (entry.title || entry.file) : activeFile;
      }
    }

    function checkStale(fm, isLatest) {
      const banner = document.getElementById('stale-banner');
      if (activeSubject.style !== 'literary' || !isLatest || !fm.date) {
        banner.style.display = 'none';
        return;
      }
      if (fm.date < todayInEastern()) {
        const day = fm.day || dayOfWeek(fm.date);
        banner.textContent = `Last brief · ${day} · ${formatDateLong(fm.date)}`;
        banner.style.display = 'block';
      } else {
        banner.style.display = 'none';
      }
    }

    function renderContent(body) {
      const html = marked.parse(body);
      const content = document.getElementById('content');
      content.innerHTML = html;
      if (activeSubject.style === 'literary') {
        tagStructure(content);
        wrapStories(content);
        makeStoriesCollapsible(content);        // Tech: each story becomes a collapsible section
        makeMinorSectionsCollapsible(content);  // …and so do UNDER THE RADAR / FEEDBACK QUESTIONS
        wireGlanceLinks(content);
        startLitScrollTracker();
        updateActiveLitStory();
      }
      applyFooter();
      syncCollapseIcon();   // refresh the universal expand/collapse button
    }

    function applyFooter() {
      document.getElementById('page-footer').style.display = 'none';
    }

    function openLvlSection(section, instant) {
      const body = section.querySelector('.lvl-body');
      const summary = section.querySelector('.lvl-summary');
      section.classList.add('open');
      summary.setAttribute('aria-expanded', 'true');
      // Animate from current height to scrollHeight
      const target = body.scrollHeight;
      if (instant) {
        body.style.transition = 'none';
        body.style.maxHeight = 'none';   // let it grow with content
        // Force reflow then re-enable transition
        void body.offsetHeight;
        body.style.transition = '';
      } else {
        body.style.maxHeight = target + 'px';
        // After bloom completes, drop the constraint so future content reflow doesn't clip
        body.addEventListener('transitionend', function settle(e) {
          if (e.propertyName !== 'max-height') return;
          if (section.classList.contains('open')) {
            body.style.maxHeight = 'none';
          }
          body.removeEventListener('transitionend', settle);
        });
      }
    }

    function closeLvlSection(section) {
      const body = section.querySelector('.lvl-body');
      const summary = section.querySelector('.lvl-summary');
      // Lock to current pixel height first, force reflow, then animate to 0
      body.style.maxHeight = body.scrollHeight + 'px';
      void body.offsetHeight;
      section.classList.remove('open');
      summary.setAttribute('aria-expanded', 'false');
      requestAnimationFrame(() => { body.style.maxHeight = '0px'; });
    }

    function toggleLvlSection(section) {
      if (section.classList.contains('open')) {
        closeLvlSection(section);
      } else {
        openLvlSection(section, false);
      }
    }

    // Both icon SVGs are baked into each collapse-toggle button's markup
    // (see .icon-collapse / .icon-expand). Toggling is just a data attribute —
    // CSS crossfades + scales between them. SVG_EXPAND/SVG_COLLAPSE strings
    // are gone; use setBtnIcon(btn, 'expand' | 'collapse') instead.
    function setBtnIcon(btn, which) {
      if (!btn) return;
      btn.dataset.icon = which;
    }

    // Open/close every .lvl-section on the page (used by FI, Lvls, P&C, Lexis,
    // WebDev, and the collapsible Tech stories). Icon state is handled separately
    // by syncCollapseIcon().
    function toggleAllLvlSections() {
      const sections = Array.from(document.querySelectorAll('.lvl-section'));
      if (sections.length === 0) return;
      const allOpen = sections.every(s => s.classList.contains('open'));
      if (allOpen) {
        sections.forEach(s => closeLvlSection(s));
      } else {
        sections.forEach(s => { if (!s.classList.contains('open')) openLvlSection(s, false); });
      }
    }

    /* =====================================================================
       UNIVERSAL EXPAND/COLLAPSE BUTTON — one fixed top-right icon (#collapse-btn)
       drives whatever is collapsible on the active tab.
       ===================================================================== */
    // Is anything currently expanded on this tab?
    function anyCollapsibleOpen() {
      return Array.from(document.querySelectorAll('.lvl-section'))
        .some(s => s.classList.contains('open'));
    }
    // How many collapsible things exist on this tab? (0 → hide the button)
    function collapsibleCount() {
      return document.querySelectorAll('.lvl-section').length;
    }
    // Keep the button's icon/label/visibility in step with the page.
    function syncCollapseIcon() {
      const btn = document.getElementById('collapse-btn');
      if (!btn) return;
      btn.style.display = 'flex';
      const open = anyCollapsibleOpen();
      setBtnIcon(btn, open ? 'collapse' : 'expand');
      btn.setAttribute('aria-label', open ? 'Collapse all' : 'Expand all');
      btn.setAttribute('aria-pressed', open ? 'false' : 'true');
    }
    // Route a click to the active tab's collapse-all behavior.
    function collapseDispatch() {
      toggleAllLvlSections();
      syncCollapseIcon();
    }
    document.getElementById('collapse-btn').addEventListener('click', collapseDispatch);

    /* =====================================================================
       LITERARY STRUCTURAL TAGGING — briefs only
       ===================================================================== */
    function tagStructure(root) {
      const h1 = root.querySelector('h1');
      if (h1) h1.remove();

      const h2s = Array.from(root.querySelectorAll('h2'));
      if (h2s.length === 0) return;

      h2s[0].classList.add('glance-heading');

      let firstStory = true;
      for (let i = 1; i < h2s.length; i++) {
        const h2 = h2s[i];
        const txt = h2.textContent.trim();

        if (/^\d+\./.test(txt)) {
          h2.classList.add('story-heading');
          if (firstStory) { h2.classList.add('first'); firstStory = false; }

          let sib = h2.nextElementSibling;
          while (sib && sib.tagName !== 'P' && sib.tagName !== 'H2') {
            sib = sib.nextElementSibling;
          }
          if (sib && sib.tagName === 'P'
              && sib.firstChild && sib.firstChild.nodeName === 'STRONG') {
            sib.classList.add('story-meta');
          }

          let walker = h2.nextElementSibling;
          while (walker && walker.tagName !== 'H2') {
            if (walker.tagName === 'P') {
              const em = walker.querySelector('em');
              if (em && /^why it matters/i.test(em.textContent.trim())) {
                walker.classList.add('why-it-matters');
                break;
              }
            }
            walker = walker.nextElementSibling;
          }
        } else {
          h2.classList.add('section-minor');
        }
      }

      const hr = root.querySelector('hr');
      if (hr) {
        let next = hr.nextElementSibling;
        while (next && next.tagName !== 'P' && next.tagName !== 'H2') {
          next = next.nextElementSibling;
        }
        if (next && next.tagName === 'P') {
          const em = next.querySelector('em');
          if (em && next.textContent.trim() === em.textContent.trim()) {
            next.classList.add('lede');
          }
        }
      }
    }

    function wrapStories(root) {
      Array.from(root.querySelectorAll('h2.story-heading')).forEach((h2, idx) => {
        const elements = [h2];
        let next = h2.nextElementSibling;
        while (next && next.tagName !== 'H2' && next.tagName !== 'HR') {
          elements.push(next);
          next = next.nextElementSibling;
        }
        const wrap = document.createElement('div');
        wrap.className = 'story-block';
        wrap.id = `story-${idx + 1}`;
        h2.parentNode.insertBefore(wrap, h2);
        elements.forEach(el => wrap.appendChild(el));
      });
    }

    // Tech: turn each wrapped story into a collapsible .lvl-section so the
    // universal expand/collapse button works here exactly like the other tabs.
    // The story heading becomes the summary bar; everything else moves into the
    // collapsible body. The story-N id + .story-block class are kept so glance
    // links, scroll, and the glow animation keep working.
    function makeStoriesCollapsible(root) {
      Array.from(root.querySelectorAll('.story-block')).forEach(block => {
        const heading = block.querySelector('h2.story-heading');
        if (!heading) return;
        const labelText = heading.textContent.trim();

        const section = document.createElement('div');
        section.className = 'lvl-section story-block lit-section';
        section.id = block.id;   // keep story-N for glance links / scroll

        const summary = document.createElement('button');
        summary.className = 'lvl-summary';
        summary.type = 'button';
        summary.setAttribute('aria-expanded', 'false');
        summary.innerHTML =
          `<span class="lvl-label-wrap">
            <span class="lvl-label">${escapeHtml(labelText)}</span>
          </span>
          <svg class="lvl-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="9 6 15 12 9 18"></polyline>
          </svg>`;

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'lvl-body';
        Array.from(block.childNodes).forEach(node => {
          if (node === heading) return;
          bodyWrap.appendChild(node);
        });

        block.parentNode.insertBefore(section, block);
        section.appendChild(summary);
        section.appendChild(bodyWrap);
        block.remove();

        summary.addEventListener('click', () => toggleLvlSection(section));
        // Starts collapsed for a clean "At a glance + headlines" first view.
      });
    }

    // Tech: wrap the "section-minor" headings (UNDER THE RADAR, FEEDBACK QUESTIONS)
    // and their content into collapsible .lvl-section units like the stories.
    // Removing the h2 also drops its thick top rule, so these read as clean cards.
    function makeMinorSectionsCollapsible(root) {
      Array.from(root.querySelectorAll('h2.section-minor')).forEach(h2 => {
        const labelText = h2.textContent.trim();
        const section = document.createElement('div');
        section.className = 'lvl-section lit-section lit-minor-section';

        const summary = document.createElement('button');
        summary.className = 'lvl-summary';
        summary.type = 'button';
        summary.setAttribute('aria-expanded', 'false');
        summary.innerHTML =
          `<span class="lvl-label-wrap">
            <span class="lvl-label">${escapeHtml(labelText)}</span>
          </span>
          <svg class="lvl-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="9 6 15 12 9 18"></polyline>
          </svg>`;

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'lvl-body';

        // Collect siblings until the next section-minor heading (or end).
        let walker = h2.nextElementSibling;
        const toMove = [];
        while (walker && !(walker.tagName === 'H2' && walker.classList.contains('section-minor'))) {
          toMove.push(walker);
          walker = walker.nextElementSibling;
        }

        h2.parentNode.insertBefore(section, h2);
        section.appendChild(summary);
        section.appendChild(bodyWrap);
        toMove.forEach(el => bodyWrap.appendChild(el));
        h2.remove();

        summary.addEventListener('click', () => toggleLvlSection(section));
      });
    }

    // Israel (dispatch): wrap each .dispatch-day-story into a collapsible lvl-section.
    // Headline becomes the summary bar; dateline, summary, and body collapse inside.
    // Preserves dispatch-story-N id so glance links + scrollToStory keep working.
    function makeDispatchStoriesCollapsible(root) {
      Array.from(root.querySelectorAll('.dispatch-day-story')).forEach(block => {
        const headline = block.querySelector('h2.dispatch-day-headline');
        const labelText = headline ? headline.textContent.trim() : 'Story';

        const section = document.createElement('div');
        section.className = 'lvl-section story-block dispatch-section';
        section.id = block.id;   // keep dispatch-story-N for glance links / scroll

        const summary = document.createElement('button');
        summary.className = 'lvl-summary';
        summary.type = 'button';
        summary.setAttribute('aria-expanded', 'false');
        summary.innerHTML =
          `<span class="lvl-label-wrap">
            <span class="lvl-label">${escapeHtml(labelText)}</span>
          </span>
          <svg class="lvl-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="9 6 15 12 9 18"></polyline>
          </svg>`;

        const bodyWrap = document.createElement('div');
        bodyWrap.className = 'lvl-body';
        Array.from(block.childNodes).forEach(node => bodyWrap.appendChild(node));

        block.parentNode.insertBefore(section, block);
        section.appendChild(summary);
        section.appendChild(bodyWrap);
        block.remove();

        summary.addEventListener('click', () => toggleLvlSection(section));
      });
    }

    function wireGlanceLinks(root) {
      const list = root.querySelector('h2.glance-heading + ol');
      if (!list) return;
      list.querySelectorAll('li').forEach((li, idx) => {
        li.classList.add('glance-link');
        li.addEventListener('click', () => scrollToStory(idx + 1));
      });
    }

    function scrollToStory(num) {
      // Works for both Tech (story-N) and Dispatch (dispatch-story-N)
      const block = document.getElementById(`story-${num}`) || document.getElementById(`dispatch-story-${num}`);
      if (!block) return;
      // Tech stories are now collapsible — open the target first so the jump lands
      // on visible content, then refresh the corner button state.
      if (block.classList.contains('lvl-section') && !block.classList.contains('open')) {
        openLvlSection(block, true);
        syncCollapseIcon();
      }
      // Subtract sticky pillbar height so the heading isn't hidden behind it
      const pillbar = document.getElementById('pillbar');
      const offset = (pillbar ? pillbar.getBoundingClientRect().height : 44) + 16;
      const top = block.getBoundingClientRect().top + window.scrollY - offset;
      window.scrollTo({ top, behavior: 'smooth' });
      block.classList.remove('story-glow');
      void block.offsetWidth;
      block.classList.add('story-glow');
      block.addEventListener('animationend', () => block.classList.remove('story-glow'), { once: true });
    }

    /* =====================================================================
       READ STATE — localStorage-backed, keyed by subject + file/date
       Key format:  mr:{subjectId}:{filename or runDate}
       ===================================================================== */
    function readKey(identifier) {
      return `mr:${activeSubject ? activeSubject.id : 'unknown'}:${identifier}`;
    }
    function isRead(identifier) {
      return localStorage.getItem(readKey(identifier)) === '1';
    }
    function setRead(identifier, val) {
      val ? localStorage.setItem(readKey(identifier), '1')
          : localStorage.removeItem(readKey(identifier));
    }
    function updateReadIndicator(identifier) {
      const el = document.getElementById('read-indicator');
      // P&C carries the ✓ inline on its LEDGER/SWEEP label, so the standalone
      // indicator stays hidden there and we just re-render the label.
      if (!el) return;
      if (!identifier) { el.style.display = 'none'; return; }
      el.style.display = isRead(identifier) ? 'block' : 'none';
    }
    function appendReadCheckbox(identifier) {
      const content = document.getElementById('content');
      if (!content || !identifier) return;
      // Remove any previous checkbox
      const old = document.getElementById('read-checkbox-wrap');
      if (old) old.remove();
      const already = isRead(identifier);
      const wrap = document.createElement('div');
      wrap.className = 'read-checkbox-wrap';
      wrap.id = 'read-checkbox-wrap';
      wrap.innerHTML =
        `<label class="read-label" for="read-cb-input">
          <input type="checkbox" id="read-cb-input" ${already ? 'checked' : ''}>
          <span id="read-cb-text">${already ? '✓ Marked as read' : 'Mark as read'}</span>
        </label>`;
      content.appendChild(wrap);
      const cb   = wrap.querySelector('#read-cb-input');
      const span = wrap.querySelector('#read-cb-text');
      cb.addEventListener('change', () => {
        setRead(identifier, cb.checked);
        span.textContent = cb.checked ? '✓ Marked as read' : 'Mark as read';
        updateReadIndicator(identifier);
        // Refresh archive panel if open so the checkmark updates live
        const panel = document.getElementById('archive-panel');
        if (panel && panel.classList.contains('open')) renderArchive();
      });
      updateReadIndicator(identifier);
    }

       PROGRESS CLARITY — per-entry "Request plan" action
       Runs only on the P&C subject's LEDGER.md. Finds each entry heading
       (h3 like "REL-05 — Title"), injects a Request plan button + inline
       form, and writes the request via the local server's /api/pc-feedback.
       Degrades quietly if no feedback server is present.

    /* =====================================================================
       P&C NOTES SYSTEM
       localStorage keys: "pc-note:entry:INC-01", "pc-note:cat:income",
         "pc-note:sweep:current"
       On save, syncs to /api/pc-note-sync so serve.py writes notes.json.

    // --- Storage --------------------------------------------------------
    function renderSources(sources) {
      const btn = document.getElementById('sources-btn');
      const body = document.getElementById('sources-modal-body');
      // Fountain Sources button only ever appears on Tech (literary) + Israel (dispatch).
      const sourcesTab = activeSubject && (activeSubject.style === 'literary' || activeSubject.style === 'dispatch');
      if (!sourcesTab || !sources || !sources.length) {
        btn.style.display = 'none';
        body.innerHTML = '';
        return;
      }
      btn.style.display = '';
      body.innerHTML = sources.map(group => {
        const links = (group.links || []).map(link =>
          `<div class="source-item">
            <a class="source-link" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.title)}</a>
            <div class="source-domain">${escapeHtml(parseDomain(link.url))}</div>
          </div>`
        ).join('');
        return `<div class="source-group">
          <div class="source-group-label">${escapeHtml(group.group || '')}</div>
          ${group.why ? `<div class="source-group-why">${escapeHtml(group.why)}</div>` : ''}
          ${links}
        </div>`;
      }).join('');
    }

    function openSources() {
      const overlay = document.getElementById('sources-overlay');
      overlay.classList.add('open');
      document.getElementById('sources-modal-close').focus();
      document.body.style.overflow = 'hidden';
      // Snap the modal to the source group for the story currently on screen
      if (activeSubject && activeSubject.style === 'literary') {
        requestAnimationFrame(() => {
          const body   = document.getElementById('sources-modal-body');
          const groups = body ? body.querySelectorAll('.source-group') : [];
          const idx    = litActiveStory - 1;
          if (groups.length > 0 && groups[idx]) {
            body.scrollTop = groups[idx].offsetTop - 4;
          }
        });
      }
    }
    function closeSources() {
      const overlay = document.getElementById('sources-overlay');
      overlay.classList.remove('open');
      document.body.style.overflow = '';
      document.getElementById('sources-btn').focus();
    }
    document.getElementById('sources-btn').addEventListener('click', openSources);
    document.getElementById('sources-modal-close').addEventListener('click', closeSources);
    document.getElementById('sources-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('sources-overlay')) closeSources();
    });

    /* ===== Settings — global text size (drives --ui-font-scale) ===== */
    (function () {
      var KEY = 'ui-font-scale';
      var overlay = document.getElementById('settings-overlay');
      var btn     = document.getElementById('settings-btn');
      var closeB  = document.getElementById('settings-modal-close');
      var slider  = document.getElementById('set-fontscale');
      var valEl   = document.getElementById('set-fontscale-val');
      function applyScale(v, persist) {
        document.documentElement.style.setProperty('--ui-font-scale', v);
        valEl.textContent = Math.round(parseFloat(v) * 100) + '%';
        if (persist) { try { localStorage.setItem(KEY, v); } catch (e) {} }
      }
      var saved = null;
      try { saved = localStorage.getItem(KEY); } catch (e) {}
      var cur = saved ? parseFloat(saved) : 1;
      if (isNaN(cur)) cur = 1;
      cur = Math.min(1.4, Math.max(0.8, cur));
      slider.value = cur;
      applyScale(cur, false);
      slider.addEventListener('input', function () { applyScale(slider.value, true); });
      var resetB = document.getElementById('set-fontscale-reset');
      resetB.addEventListener('click', function () { slider.value = 1; applyScale(1, true); });
      function openSettings() { overlay.classList.add('open'); document.body.style.overflow = 'hidden'; closeB.focus(); }
      function closeSettings() { overlay.classList.remove('open'); document.body.style.overflow = ''; btn.focus(); }
      btn.addEventListener('click', openSettings);
      closeB.addEventListener('click', closeSettings);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) closeSettings(); });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && overlay.classList.contains('open')) closeSettings();
      });
    })();

    /* =====================================================================
       DISPATCH — geography lookup + date formatting
       ===================================================================== */
    const DISPATCH_GEO_LABELS = {
      'gaza':           'GAZA',
      'west-bank':      'WEST BANK',
      'east-jerusalem': 'EAST JERUSALEM',
      'israel-48':      'ISRAEL',
      'lebanon':        'LEBANON',
      'syria':          'SYRIA',
      'iran':           'IRAN',
      'yemen':          'YEMEN',
      'usa':            'UNITED STATES',
      'eu':             'EUROPE',
      'un':             'UNITED NATIONS',
      // sub-locations (preferred over parent when both present)
      'jenin':          'JENIN, WEST BANK',
      'khan-yunis':     'KHAN YUNIS, GAZA',
      'huwara':         'HUWARA, WEST BANK',
      'al-aqsa':        'AL-AQSA, EAST JERUSALEM',
      'kiryat-shmona':  'KIRYAT SHMONA, ISRAEL',
    };

    function formatDateDispatch(dateStr) {
      // Returns "30 APRIL 2026" — day month year, no commas
      const [y, m, d] = dateStr.split('-').map(Number);
      const dt = new Date(Date.UTC(y, m - 1, d));
      return new Intl.DateTimeFormat('en-GB', {
        day: 'numeric', month: 'long', year: 'numeric', timeZone: 'UTC'
      }).format(dt).toUpperCase();
    }

    function dispatchGeographyLabel(geography) {
      if (!Array.isArray(geography) || !geography.length) return '';
      const tagged = geography.map(g => ({
        slug: g,
        label: DISPATCH_GEO_LABELS[g] || g.replace(/-/g, ' ').toUpperCase()
      }));
      // Prefer sub-locations (labels containing a comma, e.g. "JENIN, WEST BANK")
      const sub = tagged.find(t => t.label.includes(','));
      return sub ? sub.label : tagged[0].label;
    }

    /* =====================================================================
       CONTEXT MODAL (dispatch only)
       ===================================================================== */
    function renderContext(storyGroups) {
      const btn  = document.getElementById('context-btn');
      const body = document.getElementById('context-modal-body');
      const hasAny = Array.isArray(storyGroups) && storyGroups.some(g => g.context && g.context.length);
      if (activeSubject.style !== 'dispatch' || !hasAny) {
        btn.classList.remove('has-context');
        body.innerHTML = '';
        return;
      }
      btn.classList.add('has-context');

      const TYPE_ORDER = ['person', 'place', 'institution', 'event', 'policy', 'concept'];
      const plural = t => t.endsWith('s') ? t : t + 's';

      body.innerHTML = storyGroups.map(({ storyNum, title, context }) => {
        if (!context || !context.length) return '';

        // Group entries by type within this story
        const groups = {};
        for (const entry of context) {
          const t = (entry.type || 'other').toLowerCase();
          if (!groups[t]) groups[t] = [];
          groups[t].push(entry);
        }
        const allTypes = [
          ...TYPE_ORDER.filter(t => groups[t]),
          ...Object.keys(groups).filter(t => !TYPE_ORDER.includes(t) && groups[t])
        ];

        return `<div class="context-story-group">
          <div class="context-story-label">${escapeHtml(storyNum + ' · ' + title)}</div>
          ${allTypes.map(t => {
            const entries   = groups[t];
            const typeLabel = escapeHtml(plural(t.charAt(0).toUpperCase() + t.slice(1)));
            return `<div class="context-type-group">
              <div class="context-type-label">${typeLabel}</div>
              ${entries.map((e, i) => `
                <div class="context-entry">
                  <div class="context-entry-name">${escapeHtml(e.name || '')}</div>
                  <div class="context-entry-body">${marked.parse(e.summary || '')}</div>
                  ${i < entries.length - 1 ? '<hr class="context-rule">' : ''}
                </div>
              `).join('')}
            </div>`;
          }).join('')}
        </div>`;
      }).join('');
    }

    function openContextForStory(fm, title, triggerEl) {

    /* =====================================================================
       ARCHIVE DROPDOWN — current subject's files
       ===================================================================== */
    function renderArchive() {
      const panel = document.getElementById('archive-panel');
      panel.innerHTML = '';
      if (!Array.isArray(activeIndex) || activeIndex.length === 0) {
        panel.innerHTML = '<div class="archive-empty">No files yet.</div>';
        return;
      }

      // Dispatch: group by run_date, show one item per run
      if (activeSubject.style === 'dispatch') {
        const runMap = new Map(); // run_date -> count
        activeIndex.forEach(item => {
          const rd = item.run_date || item.date;
          if (rd) runMap.set(rd, (runMap.get(rd) || 0) + 1);
        });
        // Maintain insertion order (index is newest-first)
        const runDates = [...runMap.keys()];
        runDates.forEach(rd => {
          const count = runMap.get(rd);
          const read = isRead(rd);
          const btn = document.createElement('button');
          btn.className = 'archive-item';
          btn.setAttribute('role', 'menuitem');
          btn.dataset.date = rd;
          const primary = formatDateLong(rd) + (read ? ' <span class="archive-read-check">✓</span>' : '');
          const secondary = dayOfWeek(rd) + (count > 1 ? ` · ${count} stories` : '');
          btn.innerHTML =
            `<div class="date">${primary}</div>` +
            `<div class="day">${escapeHtml(secondary)}</div>`;
          if (rd === activeDate) btn.classList.add('current');
          btn.addEventListener('click', () => {
            togglePanel(false);
            loadDate(rd);
          });
          panel.appendChild(btn);
        });
        return;
      }

      // All other subjects: one item per file
      // Progress style: Sweeps panel shows only sweep/audit entries (LEDGER has its own button)
      const items = (activeSubject.style === 'progress')
        ? activeIndex.filter(e => /^(audit|sweep)-/.test(e.file))
        : activeIndex;
      items.forEach(item => {
        const read = isRead(item.file);
        const btn = document.createElement('button');
        btn.className = 'archive-item';
        btn.setAttribute('role', 'menuitem');
        btn.dataset.file = item.file;
        const primaryText = item.title || (item.date ? formatDateLong(item.date) : item.file);
        const readCheck = read ? ' <span class="archive-read-check">✓</span>' : '';
        const secondary = item.day || (item.date ? formatDateLong(item.date) : '');
        btn.innerHTML =
          `<div class="date">${escapeHtml(primaryText)}${readCheck}</div>` +
          (secondary ? `<div class="day">${escapeHtml(secondary)}</div>` : '');
        if (item.file === activeFile) btn.classList.add('current');
        btn.addEventListener('click', () => {
          togglePanel(false);
          loadFile(item.file);
        });
        panel.appendChild(btn);
      });
    }

    /* =====================================================================

    let litActiveStory = 1;
    let _litScrollTimer = null;

    function updateActiveLitStory() {
      const pillbar = document.getElementById('pillbar');
      const threshold = (pillbar ? pillbar.getBoundingClientRect().bottom : 50) + 40;
      const blocks = document.querySelectorAll('#content .story-block');
      let active = 1;
      for (let i = 0; i < blocks.length; i++) {
        if (blocks[i].getBoundingClientRect().top <= threshold) active = i + 1;
        else break;
      }
      litActiveStory = active;
    }

    function _onLitScroll() {
      clearTimeout(_litScrollTimer);
      _litScrollTimer = setTimeout(updateActiveLitStory, 50);
    }
    function startLitScrollTracker() {
      stopLitScrollTracker();
      window.addEventListener('scroll', _onLitScroll, { passive: true });
    }
    function stopLitScrollTracker() {
      window.removeEventListener('scroll', _onLitScroll);
      clearTimeout(_litScrollTimer);

    /* =====================================================================
       INIT
       ===================================================================== */
    (async function init() {
      const ok = await loadSubjects();
      if (!ok) return;
      renderPillbar();
      const savedId = (() => { try { return localStorage.getItem('active-subject'); } catch(e) { return null; } })();
      const startId = (savedId && SUBJECTS.find(s => s.id === savedId)) ? savedId : SUBJECTS[0].id;
      switchSubject(startId);
    })();

    function searchTokenize(text) {
      if (!text) return [];
      const out = [];
      const parts = String(text).toLowerCase().split(/[^a-z0-9]+/);
      for (let i = 0; i < parts.length; i++) {
        const t = parts[i];
        if (!t || t.length < 3) continue;
        if (SEARCH_STOPWORDS.has(t)) continue;
        if (/^\d+$/.test(t) && t.length < 4) continue; // skip tiny numerics
        out.push(t);
      }
      return out;
    }

    function searchStripMarkdown(md) {
      if (!md) return '';
      return String(md)
        .replace(/```[\s\S]*?```/g, ' ')         // code fences
        .replace(/`[^`]*`/g, ' ')                 // inline code
        .replace(/!\[[^\]]*]\([^)]*\)/g, ' ')     // images
        .replace(/\[([^\]]+)]\([^)]*\)/g, '$1')   // links → text
        .replace(/^\s{0,3}#{1,6}\s+/gm, '')       // heading hashes
        .replace(/[*_~>#]+/g, ' ')                // misc md
        .replace(/\s+/g, ' ')
        .trim();
    }

    function searchAddDoc(doc) {
      doc.id = SEARCH.docs.length;
      SEARCH.docs.push(doc);
      const seen = new Set();
      const combined = (doc.title || '') + ' ' + (doc.body || '');
      const tokens = searchTokenize(combined);
      for (const tok of tokens) {
        if (seen.has(tok)) continue;
        seen.add(tok);
        let set = SEARCH.postings.get(tok);
        if (!set) { set = new Set(); SEARCH.postings.set(tok, set); }
        set.add(doc.id);
      }
      // Also index title-only tokens with a marker for title-hit scoring
      const titleTokens = new Set(searchTokenize(doc.title || ''));
      doc.titleTokens = titleTokens;
    }

    async function searchFetchText(url) {
      try {
        const res = await fetch(url + cb());
        if (!res.ok) return null;
        return await res.text();
      } catch (e) { return null; }
    }

    async function buildSearchIndex() {
      if (SEARCH.building || SEARCH.ready) return;
      SEARCH.building = true;
      const statusEl = document.getElementById('search-status');

      // 1) Subjects with markdown files
      for (const subj of SUBJECTS) {
        let idx = subjectIndexCache[subj.id];
        if (!idx) {
          try {
            const r = await fetch(`/${subj.folder}/index.json${cb()}`);
            if (r.ok) { idx = await r.json(); sortSubjectIndex(subj, idx); subjectIndexCache[subj.id] = idx; }
          } catch (e) { idx = []; }
        }
        if (!Array.isArray(idx)) continue;

        // Fetch files in parallel batches to keep it snappy
        const BATCH = 6;
        for (let i = 0; i < idx.length; i += BATCH) {
          const slice = idx.slice(i, i + BATCH);
          await Promise.all(slice.map(async item => {
            const fname = item.file;
            if (!fname) return;
            const raw = await searchFetchText(`/${subj.folder}/${fname}`);
            if (!raw) return;
            const { frontmatter, body } = parseFrontmatter(raw);
            const fmText = [
              frontmatter.headline, frontmatter.title, frontmatter.topic,
              frontmatter.topic_simple, frontmatter.subtitle, frontmatter.summary,
              Array.isArray(frontmatter.tags) ? frontmatter.tags.join(' ') : ''
            ].filter(Boolean).join(' ');
            const title =
              frontmatter.headline || frontmatter.title || frontmatter.topic ||
              frontmatter.topic_simple || item.title || fname.replace(/\.md$/, '');
            const date = frontmatter.date || item.date || item.run_date || '';
            const isDispatch = subj.style === 'dispatch';
            SEARCH.docs.length; // noop; just to keep linters quiet
            searchAddDoc({
              subjectId: subj.id,
              subjectName: subj.displayTitle || subj.name,
              style: subj.style,
              file: fname,
              date,
              dateField: isDispatch ? (item.run_date || item.date || '') : '',
              title: String(title),
              body: fmText + ' ' + searchStripMarkdown(body),
            });
          }));
        }
      }


      SEARCH.ready = true;
      SEARCH.building = false;
      if (statusEl) {
        statusEl.textContent = `Indexed ${SEARCH.docs.length} entries across ${SUBJECTS.length} tabs.`;
        // Re-run any pending query
        const inputEl = document.getElementById('search-input');
        if (inputEl && inputEl.value.trim()) runSearch(inputEl.value);
        else statusEl.classList.add('hidden');
      }
    }

    /* ---------- Query ---------- */
    function searchEscapeRegex(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function searchEscapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function searchBuildSnippet(body, tokens, phrase) {
      const text = String(body || '');
      if (!text) return '';
      let hitIdx = -1;
      if (phrase && phrase.length >= 2) {
        const re = new RegExp(searchEscapeRegex(phrase), 'i');
        const m = re.exec(text); if (m) hitIdx = m.index;
      }
      if (hitIdx < 0) {
        for (const t of tokens) {
          const re = new RegExp('\\b' + searchEscapeRegex(t), 'i');
          const m = re.exec(text); if (m) { hitIdx = m.index; break; }
        }
      }
      if (hitIdx < 0) hitIdx = 0;
      const start = Math.max(0, hitIdx - 60);
      const end = Math.min(text.length, hitIdx + 140);
      let snippet = (start > 0 ? '…' : '') + text.slice(start, end) + (end < text.length ? '…' : '');
      snippet = searchEscapeHtml(snippet);
      // Highlight every token + phrase
      const all = phrase ? [phrase, ...tokens] : tokens.slice();
      const unique = Array.from(new Set(all.filter(Boolean)));
      if (unique.length) {
        const re = new RegExp('(' + unique.map(searchEscapeRegex).join('|') + ')', 'gi');
        snippet = snippet.replace(re, '<mark>$1</mark>');
      }
      return snippet;
    }

    function runSearch(query) {
      const q = String(query || '').trim();
      SEARCH.lastQuery = q;
      const resultsEl = document.getElementById('search-results');
      const statusEl = document.getElementById('search-status');
      if (!q) {
        resultsEl.innerHTML = '';
        if (SEARCH.ready) statusEl.classList.add('hidden');
        SEARCH.results = []; SEARCH.activeIndex = -1;
        return;
      }
      if (!SEARCH.ready) {
        statusEl.classList.remove('hidden');
        statusEl.textContent = 'Building search index… your query will run as soon as it finishes.';
        return;
      }
      statusEl.classList.add('hidden');
      const tokens = searchTokenize(q);
      if (!tokens.length) {
        resultsEl.innerHTML = '<div class="search-empty">Try a longer search term.</div>';
        SEARCH.results = []; SEARCH.activeIndex = -1;
        return;
      }
      // Gather candidates: union of postings, but rank by how many tokens hit
      const tokenHitCounts = new Map(); // docId -> hit count
      for (const t of tokens) {
        const set = SEARCH.postings.get(t);
        if (!set) continue;
        for (const id of set) tokenHitCounts.set(id, (tokenHitCounts.get(id) || 0) + 1);
      }
      // Score
      const phrase = tokens.length > 1 ? q.toLowerCase() : '';
      const scored = [];
      for (const [docId, hits] of tokenHitCounts) {
        const doc = SEARCH.docs[docId];
        let score = hits * 10;
        if (hits === tokens.length) score += 25;     // all-tokens bonus
        // Title hits
        let titleHits = 0;
        for (const t of tokens) if (doc.titleTokens.has(t)) titleHits++;
        score += titleHits * 30;
        // Phrase bonus
        if (phrase && doc.body && doc.body.toLowerCase().indexOf(phrase) !== -1) score += 40;
        if (phrase && doc.title && doc.title.toLowerCase().indexOf(phrase) !== -1) score += 60;
        scored.push({ doc, score, hits });
      }
      scored.sort((a, b) => b.score - a.score);
      const top = scored.slice(0, 40);
      SEARCH.results = top;
      SEARCH.activeIndex = top.length ? 0 : -1;
      renderSearchResults(tokens, phrase);
    }

    function renderSearchResults(tokens, phrase) {
      const resultsEl = document.getElementById('search-results');
      const top = SEARCH.results;
      if (!top.length) {
        resultsEl.innerHTML = '<div class="search-empty">No matches.</div>';
        return;
      }
      // Group by subject
      const groups = new Map();
      for (const r of top) {
        const key = r.doc.subjectName;
        if (!groups.has(key)) groups.set(key, []);
        groups.get(key).push(r);
      }
      let html = '';
      let rowIdx = 0;
      for (const [name, items] of groups) {
        html += `<div class="search-group-label">${searchEscapeHtml(name)}</div>`;
        for (const r of items) {
          const d = r.doc;
          const ctx = d.style === 'marius' ? (d.projectId || '') :
                      (d.date ? d.date + ' · ' : '') + (d.file || '');
          const snippet = searchBuildSnippet(d.body, tokens, phrase);
          const isActive = rowIdx === SEARCH.activeIndex;
          html += `<div class="search-result${isActive ? ' active' : ''}" data-row="${rowIdx}" data-doc="${d.id}">
            <div class="search-result-main">
              <div class="search-result-title">${searchEscapeHtml(d.title)}</div>
              <div class="search-result-meta">
                <span class="search-result-chip">${searchEscapeHtml(d.subjectName)}</span>
                <span class="search-result-context">${searchEscapeHtml(ctx)}</span>
              </div>
              <div class="search-result-snippet">${snippet}</div>
            </div>
            <button class="search-jump-btn" data-doc="${d.id}" aria-label="Jump to result">
              <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M14.1427 15.9621C14.2701 16.2169 14.1593 16.5264 13.8991 16.6424L4.49746 20.835C3.00163 21.5021 1.45007 20.0209 2.19099 18.6331L5.34302 12.7294C5.58818 12.2702 5.58818 11.7298 5.34302 11.2706L2.19099 5.36689C1.45006 3.97914 3.00163 2.49789 4.49746 3.16496L8.02178 4.73662C8.44465 4.9252 8.78899 5.25466 8.99606 5.6688L14.1427 15.9621Z" fill="currentColor"/>
                <path opacity="0.5" d="M15.5332 15.3904C15.6529 15.6297 15.9397 15.7324 16.1841 15.6235L21.0066 13.4728C22.3304 12.8825 22.3304 11.1181 21.0066 10.5278L12.1089 6.55983C11.6802 6.36864 11.2481 6.82023 11.458 7.24008L15.5332 15.3904Z" fill="currentColor"/>
              </svg>
            </button>
          </div>`;
          rowIdx++;
        }
      }
      resultsEl.innerHTML = html;
      // Wire row clicks
      resultsEl.querySelectorAll('.search-result').forEach(el => {
        el.addEventListener('click', () => {
          const id = parseInt(el.dataset.doc, 10);
          jumpToDoc(id, SEARCH.lastQuery);
        });
      });
      resultsEl.querySelectorAll('.search-jump-btn').forEach(el => {
        el.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = parseInt(el.dataset.doc, 10);
          jumpToDoc(id, SEARCH.lastQuery);
        });
      });
    }

    function searchSetActive(delta) {
      if (!SEARCH.results.length) return;
      let i = SEARCH.activeIndex + delta;
      if (i < 0) i = SEARCH.results.length - 1;
      if (i >= SEARCH.results.length) i = 0;
      SEARCH.activeIndex = i;
      const rows = document.querySelectorAll('.search-result');
      rows.forEach((r, idx) => r.classList.toggle('active', idx === i));
      const active = rows[i];
      if (active) active.scrollIntoView({ block: 'nearest' });
    }

    /* ---------- Palette open/close ---------- */
    function openSearchPalette() {
      const overlay = document.getElementById('search-overlay');
      overlay.classList.add('open');
      const inp = document.getElementById('search-input');
      // Defer focus so transition can begin
      setTimeout(() => { inp.focus(); inp.select(); }, 30);
      // Kick off index build if not already done
      if (!SEARCH.ready && !SEARCH.building) {
        const statusEl = document.getElementById('search-status');
        if (statusEl) { statusEl.classList.remove('hidden'); statusEl.textContent = 'Building search index…'; }
        buildSearchIndex();
      } else if (SEARCH.ready) {
        const statusEl = document.getElementById('search-status');
        if (statusEl && !inp.value.trim()) {
          statusEl.classList.remove('hidden');
          statusEl.textContent = `Indexed ${SEARCH.docs.length} entries across ${SUBJECTS.length} tabs.`;
        }
      }
    }
    function closeSearchPalette() {
      document.getElementById('search-overlay').classList.remove('open');
    }

    /* ---------- Jump + persistent highlight ---------- */
    function clearSearchHighlight() {
      const m = document.querySelector('mark.mr-search-hit');
      if (!m) return;
      const parent = m.parentNode;
      while (m.firstChild) parent.insertBefore(m.firstChild, m);
      parent.removeChild(m);
      parent.normalize && parent.normalize();
      SEARCH.lastHighlight = null;
    }

    function highlightInContent(query) {
      clearSearchHighlight();
      const root = document.getElementById('content');
      if (!root || !query) return false;
      const needle = String(query).trim();
      if (!needle) return false;
      // Try full phrase first; if not present in content, fall back to the
      // first content-bearing token so a jump always lands on *something*.
      const tokens = searchTokenize(needle);
      let pattern = searchEscapeRegex(needle);
      let re = new RegExp(pattern, 'i');
      const rootText = root.textContent || '';
      if (!re.test(rootText) && tokens.length) {
        const found = tokens.find(t => new RegExp('\\b' + searchEscapeRegex(t), 'i').test(rootText));
        if (!found) return false;
        re = new RegExp('\\b' + searchEscapeRegex(found), 'i');
      }
      // Walk text nodes
      const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          if (!node.nodeValue || !node.nodeValue.trim()) return NodeFilter.FILTER_REJECT;
          // Skip inside <script>, <style>, or existing mark
          let p = node.parentNode;
          while (p && p !== root) {
            const tag = p.nodeName;
            if (tag === 'SCRIPT' || tag === 'STYLE') return NodeFilter.FILTER_REJECT;
            if (p.classList && p.classList.contains('mr-search-hit')) return NodeFilter.FILTER_REJECT;
            p = p.parentNode;
          }
          return re.test(node.nodeValue) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
        }
      });
      const node = walker.nextNode();
      if (!node) return false;
      const m = re.exec(node.nodeValue);
      if (!m) return false;
      const before = node.nodeValue.slice(0, m.index);
      const hit = node.nodeValue.slice(m.index, m.index + m[0].length);
      const after = node.nodeValue.slice(m.index + m[0].length);
      const parent = node.parentNode;
      const beforeNode = document.createTextNode(before);
      const mark = document.createElement('mark');
      mark.className = 'mr-search-hit';
      mark.textContent = hit;
      const afterNode = document.createTextNode(after);
      parent.insertBefore(beforeNode, node);
      parent.insertBefore(mark, node);
      parent.insertBefore(afterNode, node);
      parent.removeChild(node);
      SEARCH.lastHighlight = mark;
      // Scroll into view, accounting for the sticky pillbar
      const pillbar = document.getElementById('pillbar');
      const offset = (pillbar ? pillbar.getBoundingClientRect().height : 44) + 24;
      const rect = mark.getBoundingClientRect();
      const y = window.scrollY + rect.top - offset;
      window.scrollTo({ top: y, behavior: 'smooth' });
      return true;
    }

    async function jumpToDoc(docId, query) {
      const doc = SEARCH.docs[docId];
      if (!doc) return;
      closeSearchPalette();
      // Switch subject if not already active
      if (!activeSubject || activeSubject.id !== doc.subjectId) {
        await switchSubject(doc.subjectId);
      }
      // Subject-specific navigation
      if (doc.style === 'dispatch') {
        await loadDate(doc.dateField || doc.date);
      } else if (doc.file) {
        await loadFile(doc.file);
      }
      // Give the renderer a tick to paint, then highlight
      setTimeout(() => { highlightInContent(query); }, 120);
    }

    /* ---------- Wire it up ---------- */
    function initSearchUI() {
      const btn = document.getElementById('search-btn');
      const overlay = document.getElementById('search-overlay');
      const input = document.getElementById('search-input');
      btn.addEventListener('click', openSearchPalette);
      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSearchPalette(); });
      const closeBtn = document.getElementById('search-modal-close');
      if (closeBtn) closeBtn.addEventListener('click', closeSearchPalette);
      // Global shortcuts
      document.addEventListener('keydown', (e) => {
        const isMac = navigator.platform.toUpperCase().indexOf('MAC') !== -1;
        const cmdK = (isMac ? e.metaKey : e.ctrlKey) && (e.key === 'k' || e.key === 'K');
        if (cmdK) { e.preventDefault(); openSearchPalette(); return; }
        if (e.key === 'Escape') {
          if (overlay.classList.contains('open')) { closeSearchPalette(); return; }
          if (SEARCH.lastHighlight) { clearSearchHighlight(); return; }
        }
        // Dismiss highlight on any click outside it handled below
      });
      document.addEventListener('click', (e) => {
        if (!SEARCH.lastHighlight) return;
        if (e.target === SEARCH.lastHighlight) return;
        if (overlay.contains(e.target)) return;
        // Clicking the search button shouldn't clear, but anything else should
        if (btn.contains(e.target)) return;
        clearSearchHighlight();
      }, true);
      // Palette-scoped keys
      input.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowDown') { e.preventDefault(); searchSetActive(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); searchSetActive(-1); }
        else if (e.key === 'Enter') {
          e.preventDefault();
          if (SEARCH.activeIndex >= 0 && SEARCH.results[SEARCH.activeIndex]) {
            jumpToDoc(SEARCH.results[SEARCH.activeIndex].doc.id, SEARCH.lastQuery);
          }
        }
      });
      let qTimer = null;
      input.addEventListener('input', () => {
        clearTimeout(qTimer);
        qTimer = setTimeout(() => runSearch(input.value), 80);
      });
    }

    // Hook into existing init flow — initSearchUI immediately, build index after a tick
    document.addEventListener('DOMContentLoaded', () => {
      initSearchUI();
      // Defer the heavy walk so initial subject paint isn't blocked
      setTimeout(() => { buildSearchIndex(); }, 600);
    });
    // If DOMContentLoaded already fired (script at end of body), run now
    if (document.readyState === 'interactive' || document.readyState === 'complete') {
      initSearchUI();
      setTimeout(() => { buildSearchIndex(); }, 600);
    }

  </script>

</body>
</html>
