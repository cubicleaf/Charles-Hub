<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Charles Hub</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Marked.js: converts markdown text into HTML -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <!-- js-yaml: parses the YAML frontmatter at the top of brief files -->
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>

  <style>
    /* ============================================================
       TOKENS — warm palette + per-subject accent
       --accent gets overwritten by JS when the active subject changes
       ============================================================ */
    :root {
      --bg:        #f5f0e8;   /* warm cream paper */
      --ink:       #2c2416;   /* warm near-black for primary text */
      --ink-muted: #6b5f4a;   /* warm taupe for supporting text */
      --ink-soft:  #8a7e67;   /* lighter warm taupe for metadata */
      --rule:      #d4c9b3;   /* sand rule line */
      --rule-soft: #e4dcc8;   /* lighter sand for dashed rules */

      --accent:    #7d6238;   /* unified bronze — per-tab accent retired (was terracotta/red/green/blue) */

      /* Earth tone for the archive + expand/collapse corner icon buttons.
         Candidates Tim is choosing between (swap this one value):
           #a89060 olive-gold (matches active nav pill)
           #9a7b4f bronze/ochre (Marius accent family)
           #6b5030 rich brown  ← current default
           #3d2f1f deep espresso */
      --btn-earth: #9a7b4f;
      /* Hover shade for all four top-right corner icons — a darker bronze.
         Replaces the old per-tab var(--accent) hover (red/green/blue), which
         was a holdover from when each tab tinted these icons. */
      --btn-earth-hover: #7d6238;

      --ui-font-scale: 1;     /* user text-size multiplier (Settings slider; persisted) */

      --ease:        cubic-bezier(0.25, 0.1, 0.25, 1);
      --ease-bloom:  cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Single global type lever: fluid by viewport (clamp) AND user-scalable
       (--ui-font-scale, set by the Settings slider). Every rem in the file
       derives from this, so all text scales together — no per-view drift. */
    html { font-size: calc(clamp(15px, 0.6vw + 11.5px, 21px) * var(--ui-font-scale, 1)); }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Literata', Georgia, serif;
      /* Full-bleed width (94vw, the whole-screen rail). Type scale now lives at
         :root (html font-size) so ALL rem sizes scale together and obey the
         Settings slider — this is what fixes the cross-tab size inconsistency. */
      font-size: 1rem;
      line-height: 1.65;
      padding: 0 1.75rem 4rem;
      max-width: 94vw;
      margin: 0 auto;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    @media (max-width: 480px) {
      body { padding: 0 1.25rem 3rem; }
    }

    /* ============================================================
       MOBILE MASTHEAD — prevent title↔corner-button collision
       Defined in ONE place so any subject's title obeys the rule.
       The corner buttons are position:absolute; the title is normal-flow
       and centered. Padding on the title reserves a "no-go" zone equal
       to the buttons' real width. Font-size scales down to fit too.
       ============================================================ */
    @media (max-width: 480px) {
      h1.masthead-title {
        font-size: 1.65rem;        /* was 2.25rem on desktop — shrunk so "The Morning Brief" fits */
        padding: 0 4.5rem;          /* matches mobile button width (~4.25rem) + gap */
        line-height: 1.15;
      }
      .sources-btn {
        padding: 0.4rem 0.6rem;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
        min-width: 44px;            /* keep Tim's 44px touch-target floor */
        min-height: 44px;
      }
    }

    /* ============================================================
       PILL BAR — subject navigation (Pattern A)
       ============================================================ */
    .pillbar {
      position: sticky;
      top: 0;
      z-index: 60;
      background: var(--bg);
      padding: 1rem 0 0.85rem;
      margin-bottom: 1.5rem;
      display: flex;
      gap: 0.45rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .pillbar::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0;
      min-height: 44px;
      padding: 0.55rem 1.1rem;
      border-radius: 20px;
      border: 1px solid var(--rule);
      background: transparent;
      color: var(--ink-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      white-space: nowrap;
      transition:
        background 0.3s var(--ease),
        color 0.3s var(--ease),
        border-color 0.3s var(--ease),
        transform 0.15s var(--ease);
    }
    .pill:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
    }
    .pill:active { transform: scale(0.95); }
    .pill.selected {
      background: #a89060;
      color: #f5f0e8;
      border-color: #a89060;
    }

    /* ============================================================
       ENTRANCE animation
       ============================================================ */
    @keyframes enter {
      to { opacity: 1; transform: translateY(0); }
    }

    /* ============================================================
       MASTHEAD
       ============================================================ */
    header {
      position: relative;
      z-index: 2;
      text-align: center;
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
      opacity: 0;
      transform: translateY(8px);
      animation: enter 0.5s var(--ease) forwards;
    }

    h1.masthead-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 2.25rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: var(--accent);
      margin-top: 0;               /* kill browser default ~0.67em top margin */
      margin-bottom: 0.5rem;
      /* Reserve horizontal room for the absolutely-positioned corner buttons
         (Sources at left, Archive at right). Without this, long titles
         physically collide with the buttons on narrow viewports.
         Value matches the buttons' computed width (~5.5rem) plus a small gap. */
      padding: 0 5.5rem;
    }
    .masthead-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      color: var(--ink-soft);
      text-transform: uppercase;
    }

    .stale-banner {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-top: 0.75rem;
    }

    /* Sources button (left) and Ledger button.
       Archive/Musters/Sweeps were unified into .shelf-btn (see below). */
    .sources-btn {
      position: absolute;
      top: 0;
      min-width: 44px;
      min-height: 44px;
      padding: 0.5rem 0.9rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 8px;
      color: var(--ink-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        transform 150ms var(--ease),
        background 150ms var(--ease),
        color 150ms var(--ease),
        border-color 150ms var(--ease);
    }
    .sources-btn { left: 0; }
    .sources-btn:hover {
      background: rgba(125, 98, 56, 0.06);
      color: var(--ink);
      border-color: var(--ink-muted);
    }
    .sources-btn:active {
      transform: scale(0.95);
      transition: none;
    }
    .sources-btn:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* Sources stays pinned to viewport during scroll.
       position:fixed breaks it out of header flow; JS (pinContentEdgeButtons)
       sets exact top/left from the header's measured position on load.
       Fallback (4rem / 1.75rem) covers the brief moment before JS runs. */
    .sources-btn {
      position: fixed !important;
      z-index: 90;
      top: 4rem; left: 1.75rem; right: auto;
    }
    @media (max-width: 480px) {
      .sources-btn { left: 1.25rem; }
    }

    /* Progress Clarity — stale banner styled as a red freshness pill */
    /* Archive dropdown panel */
    /* Archive / Musters / Sweeps now render as a RIGHT-EDGE DRAWER (overlay).
       Full viewport height, docked flush to the right, slides in from off-screen.
       z-index 80 keeps it below the corner icon row (90) so the archive icon
       stays on top and clickable to close; the dim backdrop sits below at 70. */
    .archive-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100vh;
      height: 100dvh;
      width: 320px;
      max-width: 86vw;
      overflow-y: auto;
      background: var(--bg);
      border-left: 1px solid var(--rule);
      box-shadow: -8px 0 28px rgba(44, 36, 22, 0.12);
      padding: 4.75rem 0 1.5rem;   /* top pad clears the fixed corner icon row */
      z-index: 80;
      transform: translateX(100%);
      pointer-events: none;
      transition: transform 0.32s var(--ease);
    }
    .archive-panel.open {
      transform: translateX(0);
      pointer-events: auto;
    }
    /* Faint dim behind the drawer; click it to close. */
    .archive-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 22, 0.18);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.32s var(--ease);
      z-index: 70;
    }
    .archive-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }
    .archive-item {
      display: block;
      width: 100%;
      padding: 0.6rem 1rem;
      background: transparent;
      border: none;
      text-align: left;
      cursor: pointer;
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      transition: background 150ms var(--ease), color 150ms var(--ease);
    }
    .archive-item:hover { background: rgba(125, 98, 56, 0.06); }
    .archive-item.current { color: var(--accent); }
    .archive-item .date {
      font-size: 0.85rem;
      font-weight: 500;
      /* Keep every row a single line at the fixed panel width; long titles
         (e.g. FI/WebDev) truncate with an ellipsis instead of widening the box. */
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .archive-item .day {
      font-size: 0.7rem;
      color: var(--ink-soft);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-top: 0.1rem;
    }
    .archive-item.current .day { color: var(--accent); opacity: 0.75; }
    .archive-empty {
      padding: 0.75rem 1rem;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink-soft);
    }

    /* ============================================================
       READ FEATURE — masthead indicator + content checkbox + archive dot
       ============================================================ */
    .read-indicator {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-top: 0.3rem;
      opacity: 0.8;
    }
    .read-indicator::before { content: '✓'; }

    /* Checkbox at bottom of every rendered item */
    .read-checkbox-wrap {
      border-top: 1px solid var(--rule-soft);
      margin-top: 3.5rem;
      padding-top: 1.5rem;
      text-align: center;
    }
    .read-label {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-soft);
      transition: color 0.2s var(--ease);
    }
    .read-label:hover { color: var(--ink); }
    .read-label input[type="checkbox"] {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    /* Archive item read checkmark */
    .archive-read-check {
      color: var(--accent);
      font-size: 0.75rem;
      opacity: 0.7;
      margin-left: 0.35rem;
    }

    /* ============================================================
       CONTENT — base markdown styling (applies to all subjects)
       ============================================================ */
    #content {
      opacity: 0;
      transform: translateY(8px);
      animation: enter 0.5s var(--ease) 0.15s forwards;
    }

    .loading {
      text-align: center;
      font-style: italic;
      color: var(--ink-soft);
      padding: 3rem 0;
      font-size: 0.95rem;
    }
    .error-message {
      text-align: center;
      font-style: italic;
      color: var(--ink-soft);
      padding: 3rem 1rem;
      font-size: 1rem;
    }
    .error-message code {
      font-family: ui-monospace, monospace;
      background: rgba(44, 36, 22, 0.06);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
      font-style: normal;
    }

    /* Neutral/default markdown styling — used when subject is NOT literary */
    #content h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.85rem;
      font-weight: 400;
      margin-bottom: 1.25rem;
      color: var(--ink);
    }
    #content h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.75rem;
      color: var(--ink);
    }
    #content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      color: var(--ink);
    }
    #content p {
      font-size: 1rem;
      line-height: 1.65;
      margin-bottom: 1rem;
      color: var(--ink);
    }
    #content ul, #content ol {
      padding-left: 1.5rem;
      margin-bottom: 1rem;
    }
    #content li { margin-bottom: 0.4rem; line-height: 1.55; }
    #content strong { color: var(--ink); font-weight: 600; }
    #content em { color: inherit; }
    #content code {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.88rem;
      background: rgba(44, 36, 22, 0.06);
      padding: 0.1rem 0.35rem;
      border-radius: 4px;
    }
    #content pre {
      background: rgba(44, 36, 22, 0.05);
      padding: 1rem;
      border-radius: 8px;
      overflow-x: auto;
      margin-bottom: 1rem;
      border: 1px solid var(--rule-soft);
    }
    #content pre code { background: transparent; padding: 0; font-size: 0.85rem; }
    #content a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 2px;
    }
    #content blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      margin-bottom: 1rem;
      color: var(--ink-muted);
      font-style: italic;
    }
    #content hr {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 2rem 0;
    }

    /* ============================================================
       LITERARY EXTRAS — only apply when tagStructure() runs (briefs)
       The class selectors are more specific than the base #content
       rules above, so they win when present
       ============================================================ */
    #content h2.glance-heading {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-top: 0;
      margin-bottom: 1.5rem;
    }
    #content h2.glance-heading + ol {
      list-style: none;
      counter-reset: glance;
      padding: 0;
      margin-bottom: 2.5rem;
    }
    #content h2.glance-heading + ol li {
      counter-increment: glance;
      position: relative;
      padding: 0.75rem 0 0.75rem 2.25rem;
      border-bottom: 1px solid var(--rule-soft);
      font-family: 'Literata', Georgia, serif;
      font-size: 1rem;
      line-height: 1.5;
      color: var(--ink);
      margin-bottom: 0;
    }
    #content h2.glance-heading + ol li:last-child { border-bottom: none; }
    #content h2.glance-heading + ol li::before {
      content: counter(glance, upper-roman) ".";
      position: absolute;
      left: 0;
      top: 0.75rem;
      color: var(--accent);
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
    #content h2.glance-heading + ol li.glance-link {
      cursor: pointer;
      transition: color 150ms var(--ease), opacity 150ms var(--ease);
    }
    #content h2.glance-heading + ol li.glance-link:hover { color: var(--accent); }
    #content h2.glance-heading + ol li.glance-link:active { opacity: 0.6; }

    .story-block {
      border-radius: 6px;
      scroll-margin-top: 1.5rem;
    }
    @keyframes story-glow-kf {
      0%   { box-shadow: 0 0 0 0px rgba(125, 98, 56, 0); }
      18%  { box-shadow: 0 0 0 2px rgba(125, 98, 56, 0.4), 0 0 28px rgba(125, 98, 56, 0.13); }
      100% { box-shadow: 0 0 0 0px rgba(125, 98, 56, 0); }
    }
    .story-block.story-glow {
      animation: story-glow-kf 1.8s var(--ease-bloom) forwards;
    }

    #content p.lede {
      font-style: italic;
      color: var(--ink-muted);
      font-size: 1.05rem;
      text-align: center;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    #content h2.story-heading {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.45rem;
      font-weight: 400;
      line-height: 1.3;
      border-top: 1px solid var(--rule);
      padding-top: 1.5rem;
      margin-top: 2.5rem;
      margin-bottom: 0.75rem;
      color: var(--ink);
      letter-spacing: 0.005em;
    }
    #content h2.story-heading.first {
      border-top: none;
      padding-top: 0;
      margin-top: 2rem;
    }

    #content p.story-meta {
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-bottom: 1rem;
      font-weight: 500;
    }
    #content p.story-meta strong { font-weight: 500; }

    #content p.why-it-matters {
      font-family: 'Literata', Georgia, serif;
      font-size: 0.95rem;
      font-style: italic;
      color: var(--ink-muted);
      border-top: 1px dashed var(--rule);
      padding-top: 0.75rem;
      margin-top: 1rem;
    }
    #content p.why-it-matters em:first-child {
      color: var(--accent);
      font-weight: 500;
      font-style: italic;
    }

    #content h2.section-minor {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 0.85rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      border-top: 2px solid var(--ink);
      padding-top: 3rem;
      margin-top: 3rem;
      margin-bottom: 1.5rem;
    }
    #content h2.section-minor ~ ol,
    #content h2.section-minor ~ ul {
      padding-left: 1.25rem;
      margin-bottom: 1rem;
    }
    #content h2.section-minor ~ ol li,
    #content h2.section-minor ~ ul li {
      margin-bottom: 0.5rem;
      line-height: 1.55;
    }

    /* ============================================================
       SOURCES MODAL
       ============================================================ */
    .sources-overlay {
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 22, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.2s var(--ease), visibility 0s 0.2s;
    }
    .sources-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.2s var(--ease), visibility 0s;
    }
    .sources-modal {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(44, 36, 22, 0.18);
      max-width: 1120px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(10px) scale(0.97);
      transition: transform 0.2s var(--ease);
    }
    .sources-overlay.open .sources-modal { transform: translateY(0) scale(1); }
    .sources-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .sources-modal-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .sources-modal-close {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 6px;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.65rem;
      min-height: 36px;
      transition: color 150ms, border-color 150ms, background 150ms;
    }
    .sources-modal-close:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
      background: rgba(125, 98, 56, 0.04);
    }
    .sources-modal-body {
      overflow-y: auto;
      padding: 1.25rem 1.5rem 1.75rem;
      -webkit-overflow-scrolling: touch;
    }
    .source-group { margin-bottom: 1.75rem; }
    .source-group:last-child { margin-bottom: 0; }
    .source-group-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.35rem;
    }
    .source-group-why {
      font-family: 'Literata', Georgia, serif;
      font-size: 0.82rem;
      font-style: italic;
      color: var(--ink-muted);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .source-item {
      padding: 0.45rem 0 0.45rem 0.85rem;
      border-left: 2px solid var(--rule-soft);
      margin-bottom: 0.45rem;
    }
    .source-item:last-child { margin-bottom: 0; }
    .source-link {
      display: block;
      font-family: 'Literata', Georgia, serif;
      font-size: 0.88rem;
      color: var(--ink);
      text-decoration: none;
      line-height: 1.45;
      border-bottom: 1px solid transparent;
      transition: color 150ms, border-color 150ms;
    }
    .source-link:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .source-domain {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      color: var(--ink-soft);
      margin-top: 0.15rem;
      letter-spacing: 0.04em;
    }

    .lvl-section {
      margin-top: 0.4rem;
    }
    .lvl-section:first-of-type { margin-top: 1.25rem; }

    .lvl-summary {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem;
      width: 100%;
      min-height: 44px;               /* Tim's required touch target */
      padding: 0.75rem 1rem;
      background: #efe7d6;
      border: 1px solid var(--rule-soft);
      border-radius: 6px;
      cursor: pointer;
      text-align: left;
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.005em;
      color: #6b5030;
      transition: color 0.25s var(--ease), background 0.25s var(--ease);
    }
    .lvl-summary:hover { color: #c4a870; }
    .lvl-summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
      border-radius: 4px;
    }
    .lvl-summary:active .lvl-chevron { transform: scale(0.95) rotate(0deg); }

    .lvl-summary .lvl-label-wrap {
      display: flex;
      align-items: baseline;
      gap: 0.65rem;
    }
    .lvl-tier {
      font-family: 'Inter', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #6b5030;
      font-weight: 600;
      opacity: 0.6;
    }

    /* Chevron — rotates 0deg (closed, pointing right) → 90deg (open, down) */
    .lvl-chevron {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--ink-soft);
      transition: transform 0.4s var(--ease), color 0.25s var(--ease);
    }
    .lvl-section.open .lvl-chevron {
      transform: rotate(90deg);
      color: var(--accent);
    }

    /* Body wrapper — animates open/close.
       Asymmetric timing per Tim's playbook: open is slower & blooms,
       close is faster & cleaner. */
    .lvl-body {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition:
        max-height 0.3s var(--ease),
        opacity   0.2s var(--ease),
        padding-top 0.3s var(--ease),
        padding-bottom 0.3s var(--ease);
      padding-top: 0;
      padding-bottom: 0;
    }
    .lvl-section.open .lvl-body {
      opacity: 1;
      transition:
        max-height 0.6s var(--ease-bloom),
        opacity   0.45s var(--ease-bloom) 0.1s,
        padding-top 0.6s var(--ease-bloom),
        padding-bottom 0.6s var(--ease-bloom);
      padding-top: 1.25rem;
      padding-bottom: 1.25rem;
    }
    /* Strip last-child margin so padding-bottom is the only bottom gap */
    .lvl-body > *:last-child { margin-bottom: 0; }

    /* Body inner content */
    /* ============================================================
       DISPATCH STYLE — applied when subject.style === "dispatch"
       Israel Tracker: date-digest view, multiple stories per day
       ============================================================ */
    body.style-dispatch {
      font-family: 'Literata', Georgia, serif;
    }

    /* Masthead title: section name (not story headline) */
    body.style-dispatch h1.masthead-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: normal;
      font-size: 1.75rem;
      line-height: 1.2;
      /* buttons are stacked on the right, so padding is symmetric — matches sources-btn on left */
      padding: 0 5.5rem;
    }
    @media (max-width: 480px) {
      body.style-dispatch h1.masthead-title {
        font-size: 1.4rem;
        padding: 0 4.5rem;
      }
    }

    /* Show the date line — displays selected date */
    body.style-dispatch .masthead-date {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* Dateline block: lives above each story's headline inside #content */
    .dispatch-dateline-block { margin-bottom: 0.65rem; }

    /* Standard dateline row */
    .dispatch-dateline {
      display: block;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-muted);
    }

    /* 40px oxblood hairline between dateline and story headline */
    .dispatch-rule {
      display: block;
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 0.5rem auto 0.85rem;
    }

    /* Inline source attribution at bottom of each story */
    .dispatch-source-line {
      display: block;
      font-family: 'Literata', Georgia, serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--ink-muted);
      margin-top: 0.3rem;
    }

    /* Suppress raw H1 from markdown body — headline rendered by JS */
    body.style-dispatch #content h1 { display: none; }

    /* Body text */
    body.style-dispatch #content p {
      font-size: 1rem;
      line-height: 1.65;
    }

    /* Multi-story day digest — each story block */
    .dispatch-day-story {
      padding-bottom: 2.5rem;
      margin-bottom: 2.5rem;
    }
    .dispatch-day-story:not(:last-child) {
      border-bottom: 1px solid var(--rule);
    }

    /* One-sentence summary tagline under each story headline */
    .dispatch-day-summary {
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      color: var(--ink-soft);
      font-style: italic;
      margin: -0.25rem 0 1.1rem;
      line-height: 1.5;
    }

    /* Per-story headline inside the day digest */
    .dispatch-day-headline {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: 1.6rem;
      line-height: 1.2;
      color: var(--ink);
      margin: 0 0 1rem;
    }
    @media (max-width: 480px) {
      .dispatch-day-headline { font-size: 1.3rem; }
    }

    /* Context button — right side of masthead.
       6.5rem gap is a holdover from when Archive lived in the header;
       kept as-is since it still reads fine with the header to itself. */
    .context-btn {
      position: absolute;
      top: 0;
      right: 6.5rem;
      min-width: 44px;
      min-height: 44px;
      padding: 0.5rem 0.9rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 8px;
      color: var(--ink-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      display: none; /* shown only when has-context class is present */
      transition:
        transform 150ms var(--ease),
        background 150ms var(--ease),
        color 150ms var(--ease),
        border-color 150ms var(--ease);
    }
    .context-btn.has-context { display: block; }
    .context-btn:hover {
      background: rgba(125, 98, 56, 0.06);
      color: var(--ink);
      border-color: var(--ink-muted);
    }
    .context-btn:active { transform: scale(0.95); transition: none; }
    .context-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (max-width: 480px) {
      .context-btn {
        right: 5.5rem;
        padding: 0.4rem 0.6rem;
        font-size: 0.62rem;
        letter-spacing: 0.14em;
      }
    }

    /* Dispatch: masthead context btn is replaced by per-story buttons */
    body.style-dispatch #context-btn { display: none !important; }

    /* Dateline row: source stack on left, per-story context btn on right */
    .dispatch-dateline-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0;
    }
    /* Stacked source links */
    .dispatch-source-list {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    a.dispatch-dateline {
      text-decoration: none;
      color: inherit;
    }
    a.dispatch-dateline:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
      color: var(--ink);
    }
    .story-context-btn {
      flex-shrink: 0;
      padding: 0.3rem 0.75rem;
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 6px;
      color: var(--ink-muted);
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      cursor: pointer;
      transition:
        background 150ms var(--ease),
        color 150ms var(--ease),
        border-color 150ms var(--ease);
    }
    .story-context-btn:hover {
      background: rgba(125, 98, 56, 0.06);
      color: var(--ink);
      border-color: var(--ink-muted);
    }
    .story-context-btn:active { transform: scale(0.95); transition: none; }
    .story-context-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }


    /* ============================================================
       CONTEXT MODAL — mirrors sources modal, dispatch only
       220ms ease-out fade + 8px translateY on open (spec §6)
       ============================================================ */
    .context-overlay {
      position: fixed;
      inset: 0;
      background: rgba(44, 36, 22, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 1rem;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 0.22s var(--ease), visibility 0s 0.22s;
    }
    .context-overlay.open {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transition: opacity 0.22s var(--ease), visibility 0s;
    }
    .context-modal {
      background: var(--bg);
      border: 1px solid var(--rule);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(44, 36, 22, 0.18);
      max-width: 1120px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(8px) scale(0.97);
      transition: transform 0.22s var(--ease);
    }
    .context-overlay.open .context-modal { transform: translateY(0) scale(1); }
    .context-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid var(--rule);
      flex-shrink: 0;
    }
    .context-modal-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .context-modal-close {
      background: transparent;
      border: 1px solid var(--rule);
      border-radius: 6px;
      color: var(--ink-soft);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.35rem 0.65rem;
      min-height: 36px;
      transition: color 150ms, border-color 150ms, background 150ms;
    }
    .context-modal-close:hover {
      color: var(--ink);
      border-color: var(--ink-muted);
      background: color-mix(in srgb, var(--accent) 5%, var(--bg));
    }
    .context-modal-body {
      overflow-y: auto;
      padding: 1.25rem 2.25rem 1.75rem;
      -webkit-overflow-scrolling: touch;
    }

    /* ============================================================
       MUSTER MODAL — wider + proper markdown typography.
       Scoped to #muster-overlay / #muster-modal-body so it never
       touches the shared Context modal (Israel).
       ============================================================ */
    #muster-overlay .context-modal { max-width: 1040px; }
    #muster-modal-body { padding: 1.75rem 2.75rem 2.25rem; }
    #muster-modal-body > *:first-child { margin-top: 0; }
    #muster-modal-body h1 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 400;
      color: var(--ink);
      margin: 0 0 0.5rem;
      letter-spacing: 0.005em;
    }
    #muster-modal-body h2 {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--ink);
      margin: 2.25rem 0 0.85rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--rule);
      letter-spacing: 0.005em;
    }
    #muster-modal-body h3 {
      font-family: 'Literata', Georgia, serif;
      font-size: 1.02rem;
      font-weight: 600;
      color: var(--accent);
      margin: 1.5rem 0 0.5rem;
    }
    #muster-modal-body h3 em { color: var(--ink-muted); font-weight: 500; }
    #muster-modal-body p {
      font-family: 'Literata', Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.7;
      color: var(--ink);
      margin: 0 0 1rem;
    }
    #muster-modal-body strong { color: var(--ink); font-weight: 600; }
    #muster-modal-body ul, #muster-modal-body ol { padding-left: 1.4rem; margin: 0 0 1rem; }
    #muster-modal-body li {
      font-family: 'Literata', Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    #muster-modal-body code {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.82rem;
      background: rgba(44, 36, 22, 0.06);
      padding: 0.08rem 0.34rem;
      border-radius: 4px;
      color: var(--ink-muted);
    }
    #muster-modal-body pre {
      background: rgba(44, 36, 22, 0.05);
      border: 1px solid var(--rule-soft);
      border-radius: 8px;
      padding: 0.9rem 1.1rem;
      overflow-x: auto;
      margin: 0 0 1rem;
    }
    #muster-modal-body pre code { background: transparent; padding: 0; color: var(--ink); }
    #muster-modal-body blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(44, 36, 22, 0.03);
      border-radius: 0 6px 6px 0;
      padding: 0.7rem 1rem;
      margin: 0 0 1.25rem;
      color: var(--ink-muted);
    }
    #muster-modal-body blockquote p { margin: 0; }
    #muster-modal-body hr { border: none; border-top: 1px solid var(--rule); margin: 1.75rem 0; }
    #muster-modal-body table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      margin: 0 0 1.25rem;
    }
    #muster-modal-body th, #muster-modal-body td {
      text-align: left;
      padding: 0.55rem 0.85rem;
      border: 1px solid var(--rule);
      vertical-align: top;
      line-height: 1.45;
    }
    #muster-modal-body th {
      background: rgba(44, 36, 22, 0.05);
      font-weight: 600;
      color: var(--ink);
      letter-spacing: 0.02em;
    }
    #muster-modal-body td { color: var(--ink-muted); }
    #muster-modal-body td strong { color: var(--ink); }
    @media (max-width: 480px) {
      #muster-modal-body { padding: 1.25rem 1.25rem 1.75rem; }
    }
    /* Story-level grouping inside context modal */
    .context-story-group {
      margin-bottom: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--rule);
    }
    .context-story-group:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
    .context-story-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1.1rem;
      padding-bottom: 0.55rem;
      border-bottom: 1px solid var(--rule-soft);
    }
    .context-type-group { margin-bottom: 1.5rem; }
    .context-type-group:last-child { margin-bottom: 0; }
    .context-type-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-bottom: 0.75rem;
    }
    .context-entry { padding-bottom: 0.5rem; }
    .context-entry-name {
      font-family: 'Literata', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 0.35rem;
    }
    .context-entry-body {
      font-family: 'Literata', Georgia, serif;
      font-size: 0.95rem;
      line-height: 1.55;
      color: var(--ink-muted);
    }
    .context-entry-body p { margin-bottom: 0.5rem; }
    .context-entry-body p:last-child { margin-bottom: 0; }
    hr.context-rule {
      border: none;
      border-top: 1px solid var(--rule);
      margin: 1.5rem 0;
    }

    /* ============================================================
       SETTINGS — fixed top-right gear + modal. Mirrors the sources
       modal float-up pattern; slider drives --ui-font-scale.
       ============================================================ */
    /* No wrapper chrome — the SVG's own glyph (gear) is the whole
       visible icon. Wrapper is just a transparent 44px hit area. */
    .settings-btn {
      position: fixed; top: 0.9rem; right: 0.9rem; z-index: 90;
      width: 44px; height: 44px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--btn-earth); cursor: pointer;
      transition: color 150ms var(--ease), transform 150ms var(--ease), filter 150ms var(--ease);
    }
    .settings-btn svg { width: 44px; height: 44px; display: block; }
    .settings-btn:hover { color: var(--btn-earth-hover); filter: drop-shadow(0 2px 6px rgba(44,36,22,0.10)); }
    .settings-btn:active { transform: scale(0.95); transition: none; }
    .settings-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
    @media (max-width: 480px) { .settings-btn { top: 0.6rem; right: 0.6rem; } }

    .settings-overlay {
      position: fixed; inset: 0; background: rgba(44,36,22,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 110; padding: 1rem;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.2s var(--ease), visibility 0s 0.2s;
    }
    .settings-overlay.open {
      opacity: 1; visibility: visible; pointer-events: auto;
      transition: opacity 0.2s var(--ease), visibility 0s;
    }
    .settings-modal {
      background: var(--bg); border: 1px solid var(--rule); border-radius: 12px;
      box-shadow: 0 8px 40px rgba(44,36,22,0.18);
      max-width: 420px; width: 100%; max-height: 80vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(10px) scale(0.97);
      transition: transform 0.2s var(--ease);
    }
    .settings-overlay.open .settings-modal { transform: translateY(0) scale(1); }
    .settings-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 1.5rem 1rem; border-bottom: 1px solid var(--rule); flex-shrink: 0;
    }
    .settings-modal-title {
      font-family: 'DM Serif Display', Georgia, serif; font-size: 0.8rem; font-weight: 400;
      letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent);
    }
    /* Reusable modal close button — SVG (with its own squircle background)
       IS the 44px button. No wrapper chrome, no separate background/border. */
    .modal-close-btn {
      width: 44px; height: 44px; padding: 0; flex-shrink: 0; margin-right: -10px;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--ink-muted); cursor: pointer;
      transition: color 150ms var(--ease), transform 150ms var(--ease);
    }
    .modal-close-btn svg { width: 100%; height: 100%; display: block; }
    .modal-close-btn:hover { color: var(--accent); }
    .modal-close-btn:active { transform: scale(0.95); transition: none; }
    .modal-close-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 10px; }
    .settings-modal-body { overflow-y: auto; padding: 1.5rem; -webkit-overflow-scrolling: touch; }
    .set-row-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 0.5rem; }
    .set-label { font-family: 'Inter', sans-serif; font-size: 0.72rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-muted); }
    .set-val { font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--ink); font-variant-numeric: tabular-nums; }
    .set-reset-btn {
      font-family: 'Inter', sans-serif; font-size: 0.62rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-muted); background: transparent;
      border: 1px solid var(--rule); border-radius: 4px;
      padding: 0.15rem 0.45rem; cursor: pointer; margin-left: 0.5rem;
      transition: color 150ms, border-color 150ms;
    }
    .set-reset-btn:hover { color: var(--accent); border-color: var(--accent); }
    .set-reset-btn:active { opacity: 0.7; }
    .set-slider {
      -webkit-appearance: none; appearance: none; width: 100%; height: 4px;
      border-radius: 20px; background: var(--rule); outline: none; cursor: pointer;
      margin: 0.25rem 0 0.85rem;
    }
    .set-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none; width: 22px; height: 22px;
      border-radius: 50%; background: var(--accent); border: 3px solid var(--bg);
      box-shadow: 0 1px 4px rgba(44,36,22,0.25); cursor: pointer;
    }
    .set-slider::-moz-range-thumb {
      width: 22px; height: 22px; border-radius: 50%; background: var(--accent);
      border: 3px solid var(--bg); box-shadow: 0 1px 4px rgba(44,36,22,0.25); cursor: pointer;
    }
    .set-slider:focus-visible { outline: 2px solid var(--accent); outline-offset: 4px; }
    .set-hint { font-family: 'Inter', sans-serif; font-size: 0.72rem; color: var(--ink-soft); line-height: 1.5; }

    /* ============================================================
       GLOBAL SEARCH — squircle trigger + Cmd/Ctrl+K palette overlay.
       Lives next to the gear, top-right. Indexes every subject.
       ============================================================ */
    /* No wrapper chrome — the SVG's own glyph (lens + handle) is the
       whole visible icon. Wrapper is just a transparent 44px hit area. */
    .search-btn {
      position: fixed; top: 0.9rem; right: 3.7rem; z-index: 90;
      width: 44px; height: 44px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--btn-earth); cursor: pointer;
      transition: color 150ms var(--ease), transform 150ms var(--ease), filter 150ms var(--ease);
    }
    .search-btn svg { width: 44px; height: 44px; display: block; }
    .search-btn:hover { color: var(--btn-earth-hover); filter: drop-shadow(0 2px 6px rgba(44,36,22,0.10)); }
    .search-btn:active { transform: scale(0.95); transition: none; }
    .search-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
    @media (max-width: 480px) { .search-btn { top: 0.6rem; right: 3.2rem; } }

    /* Marius / P&C expand-collapse icon button — sits left of search.
       The SVG itself draws the squircle (background path, opacity 0.5)
       — it IS the button. No separate wrapper background/border/radius. */
    .marius-collapse-btn {
      position: fixed; top: 0.9rem; right: 6.5rem; z-index: 90;
      width: 44px; height: 44px; padding: 0;
      display: none; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--btn-earth); cursor: pointer;
      transition: color 150ms var(--ease), transform 150ms var(--ease), filter 150ms var(--ease);
    }
    /* Universal expand/collapse button defaults to visible; JS (syncCollapseIcon)
       hides it only on tabs/views with nothing collapsible. */
    #collapse-btn { display: flex; }
    .marius-collapse-btn .icon-stack { position: relative; width: 100%; height: 100%; }
    .marius-collapse-btn .icon-stack svg {
      position: absolute; inset: 0; width: 100%; height: 100%; display: block;
      transition: opacity 320ms var(--ease), transform 320ms var(--ease);
    }
    .marius-collapse-btn .icon-collapse { opacity: 1; transform: scale(1) rotate(0deg); }
    .marius-collapse-btn .icon-expand   { opacity: 0; transform: scale(0.6) rotate(-45deg); }
    .marius-collapse-btn[data-icon="expand"] .icon-collapse { opacity: 0; transform: scale(0.6) rotate(45deg); }
    .marius-collapse-btn[data-icon="expand"] .icon-expand   { opacity: 1; transform: scale(1) rotate(0deg); }
    .marius-collapse-btn:hover { color: var(--btn-earth-hover); filter: drop-shadow(0 2px 6px rgba(44,36,22,0.10)); }
    .marius-collapse-btn:active { transform: scale(0.95); transition: none; }
    .marius-collapse-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 14px; }
    @media (max-width: 480px) { .marius-collapse-btn { display: none !important; } }

    /* Shelf button — opens the Archive drawer. Sits in the fixed top-right
       icon row, left of the collapse-all toggle. */
    .shelf-btn {
      position: fixed; top: 0.9rem; right: 9.3rem; z-index: 90;
      width: 44px; height: 44px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      color: var(--btn-earth); cursor: pointer;
      transition: color 150ms var(--ease), transform 150ms var(--ease);
    }
    .shelf-btn svg { width: 40px; height: 40px; display: block; }
    .shelf-btn:hover { color: var(--btn-earth-hover); }
    .shelf-btn:active { transform: scale(0.95); transition: none; }
    .shelf-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 8px; }
    @media (max-width: 480px) { .shelf-btn { right: 5.4rem; } }

    /* Sources fountain — icon button in the top-right row, immediately LEFT of
       the archive (shelf) button. Shown only on Tech + Israel via renderSources(). */
    /* Shown state is display:flex (centers the glyph). The button starts hidden
       via the inline style="display:none" in markup; renderSources() clears that
       (style.display='') to reveal it, falling back to this flex, or sets 'none'
       to hide — so the CSS default here must be flex, not none. */
    .sources-fountain-btn {
      position: fixed; top: 0.9rem; right: 11.9rem; z-index: 90;
      width: 44px; height: 44px; padding: 0;
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none;
      cursor: pointer;
      transition: transform 150ms var(--ease), filter 150ms var(--ease);
    }
    .sources-fountain-btn svg { width: 44px; height: 44px; display: block; }
    .sources-fountain-btn:hover { filter: drop-shadow(0 2px 6px rgba(44,36,22,0.14)); transform: translateY(-1px); }
    .sources-fountain-btn:active { transform: scale(0.95); transition: none; }
    .sources-fountain-btn:focus-visible { outline: 2px solid var(--btn-earth-hover); outline-offset: 2px; border-radius: 8px; }
    @media (max-width: 480px) { .sources-fountain-btn { right: 8.4rem; } }

    .search-overlay {
      position: fixed; inset: 0; background: rgba(44,36,22,0.5);
      display: flex; align-items: flex-start; justify-content: center;
      z-index: 120; padding: 8vh 1rem 1rem;
      opacity: 0; visibility: hidden; pointer-events: none;
      transition: opacity 0.2s var(--ease), visibility 0s 0.2s;
    }
    .search-overlay.open {
      opacity: 1; visibility: visible; pointer-events: auto;
      transition: opacity 0.2s var(--ease), visibility 0s;
    }
    .search-modal {
      background: var(--bg); border: 1px solid var(--rule); border-radius: 14px;
      box-shadow: 0 12px 48px rgba(44,36,22,0.22);
      max-width: 680px; width: 100%; max-height: 78vh;
      display: flex; flex-direction: column; overflow: hidden;
      transform: translateY(-12px) scale(0.98);
      transition: transform 0.2s var(--ease);
    }
    .search-overlay.open .search-modal { transform: translateY(0) scale(1); }
    .search-input-row {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.85rem 1rem; border-bottom: 1px solid var(--rule); flex-shrink: 0;
    }
    .search-input-row svg.search-icon {
      width: 18px; height: 18px; color: var(--ink-muted); flex-shrink: 0;
    }
    .search-input {
      flex: 1; min-width: 0; background: transparent; border: 0; outline: 0;
      font-family: 'Inter', sans-serif; font-size: 1rem; color: var(--ink);
      padding: 0.25rem 0;
    }
    .search-input::placeholder { color: var(--ink-soft); }
    .search-status {
      padding: 0.9rem 1.1rem; font-family: 'Inter', sans-serif;
      font-size: 0.78rem; color: var(--ink-muted); letter-spacing: 0.04em;
      border-bottom: 1px solid var(--rule);
    }
    .search-status.hidden { display: none; }
    .search-results {
      overflow-y: auto; flex: 1; min-height: 0;
      -webkit-overflow-scrolling: touch;
    }
    .search-group-label {
      font-family: 'Inter', sans-serif; font-size: 0.62rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-soft);
      padding: 0.85rem 1.1rem 0.35rem;
    }
    .search-result {
      display: grid; grid-template-columns: 1fr auto;
      gap: 0.5rem 0.85rem; align-items: center;
      padding: 0.6rem 1.1rem;
      border-top: 1px solid var(--rule);
      cursor: pointer;
      transition: background 120ms var(--ease);
    }
    .search-result:hover, .search-result.active {
      background: rgba(125,98,56,0.06);
    }
    .search-result-main { min-width: 0; }
    .search-result-title {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 0.98rem; color: var(--ink); line-height: 1.25;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .search-result-meta {
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 0.18rem;
      font-family: 'Inter', sans-serif; font-size: 0.7rem; color: var(--ink-muted);
    }
    .search-result-chip {
      font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--accent);
      border: 1px solid var(--rule); border-radius: 20px;
      padding: 2px 8px;
    }
    .search-result-context {
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .search-result-snippet {
      grid-column: 1 / -1;
      font-family: 'Inter', sans-serif; font-size: 0.78rem;
      color: var(--ink-soft); line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .search-result-snippet mark {
      background: rgba(184,112,48,0.22); color: var(--ink);
      padding: 0 2px; border-radius: 2px;
    }
    .search-jump-btn {
      background: transparent; border: none; border-radius: 8px;
      color: var(--ink-soft); cursor: pointer;
      width: 32px; height: 32px; padding: 0; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: color 150ms var(--ease), transform 150ms var(--ease);
    }
    .search-jump-btn svg { width: 20px; height: 20px; display: block; }
    .search-jump-btn:hover { color: var(--accent); }
    .search-jump-btn:active { transform: scale(0.95); transition: none; }
    .search-empty {
      padding: 1.5rem 1.1rem; font-family: 'Inter', sans-serif;
      font-size: 0.82rem; color: var(--ink-soft); text-align: center;
    }
    /* Persistent jump highlight — survives until user dismisses */
    mark.mr-search-hit {
      background: rgba(184,112,48,0.35);
      box-shadow: 0 0 0 2px rgba(184,112,48,0.35);
      border-radius: 3px;
      animation: mr-search-pulse 1.2s var(--ease) 1;
    }
    @keyframes mr-search-pulse {
      0%   { background: rgba(184,112,48,0.7); box-shadow: 0 0 0 6px rgba(184,112,48,0.35); }
      100% { background: rgba(184,112,48,0.35); box-shadow: 0 0 0 2px rgba(184,112,48,0.35); }
    }

    /* ============================================================
       MOBILE TWO-ROW HEADER (<=480px) — corner icons sit in a top
       strip; the pill nav drops to its own full-width row beneath so
       pills never slide under the icons as more tabs are added.
       Mobile only — desktop layout is unchanged.
       ============================================================ */
    @media (max-width: 480px) {
      /* Opaque strip behind the fixed corner icons so page content
         scrolls cleanly under them. Painted by the pillbar's ::before:
         it sits above page content (inside the pillbar's stacking
         context, z-index 60) but below the icons (z-index 90). */
      .pillbar::before {
        content: "";
        position: fixed;
        top: 0; left: 0; right: 0;
        height: 3.4rem;
        background: var(--bg);
        z-index: 1;
        pointer-events: none;
      }
      /* Push the pills below the icon strip at rest, and make them
         stick just under it on scroll instead of at the very top. */
      .pillbar {
        margin-top: 3.4rem;
        top: 3.4rem;
        padding: 0.4rem 0 0.6rem;
      }
      /* All four corner icons on ONE line: same top (0.6rem) and an even
         2.8rem step. Earlier per-icon mobile rules left Sources + Archive
         at top:0.9rem (lower) with uneven offsets sized for the now-hidden
         collapse icon. These win by source order. R-to-L: gear, search,
         archive, sources. */
      .settings-btn         { top: 0.6rem; right: 0.6rem; }
      .search-btn           { top: 0.6rem; right: 3.4rem; }
      .shelf-btn            { top: 0.6rem; right: 6.2rem; }
      .sources-fountain-btn { top: 0.6rem; right: 9.0rem; }
    }
